tasks.register('produceDm01BbItf', JavaExec) {
    group = 'dm01-dmav'
    description = 'Produce dm01-bb.itf from the full DM01 dataset via the productive BB profiles'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.dmav.ProduceDm01BbItfTask'
}

tasks.register('validateTransfer', JavaExec) {
    group = 'verification'
    description = 'Validate ITF/XTF output with ilivalidator. Required: -Ptransfer, -Pmodel. Optional: -Pmodeldir, -Plog'
    classpath = configurations.validator + sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.app.IlivalidatorRunner'

    doFirst {
        def transfer = project.findProperty('transfer')
        def model = project.findProperty('model')
        if (!transfer || !model) {
            throw new GradleException(
                    "Usage: ./gradlew validateTransfer -Ptransfer=<file> -Pmodel=<model> [-Pmodeldir=<dir>] [-Plog=<log>]"
            )
        }

        def modeldir = project.findProperty('modeldir') ?: 'src/test/data/av/models/;https://models.interlis.ch'
        def log = project.findProperty('log') ?: 'build/reports/ilivalidator/validation.log'

        args = [
            '--file', transfer.toString(),
            '--modeldir', modeldir.toString(),
            '--model', model.toString(),
            '--log', log.toString()
        ]
    }
}

tasks.register('runDm01DmavFullRun', JavaExec) {
    group = 'dm01-dmav'
    description = 'Run a manifest-driven DM01/DMAV full dataset bundle'
    classpath = configurations.validator + sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.dmav.fullrun.Dm01DmavFullRunTask'

    doFirst {
        def manifest = project.findProperty('dm01DmavFullRunManifest')
        if (!manifest) {
            throw new GradleException(
                    "Usage: ./gradlew runDm01DmavFullRun -Pdm01DmavFullRunManifest=<file> "
                            + "[-Pdm01DmavFullRunSource=<file>] "
                            + "[-Pdm01DmavFullRunReportDir=<dir>] "
                            + "[-Pdm01DmavFullRunOutput=<file>]"
            )
        }

        args = [
            '--manifest', manifest.toString(),
            '--repo-root', project.projectDir.toString()
        ]

        def source = project.findProperty('dm01DmavFullRunSource')
        if (source) {
            args += ['--source', source.toString()]
        }

        def reportDir = project.findProperty('dm01DmavFullRunReportDir')
        if (reportDir) {
            args += ['--report-dir', reportDir.toString()]
        }

        def output = project.findProperty('dm01DmavFullRunOutput')
        if (output) {
            args += ['--output', output.toString()]
        }
    }
}
