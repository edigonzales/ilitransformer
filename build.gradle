plugins {
    id 'application'
    id 'java'
}

group = 'guru.interlis'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
    maven {
        url = uri('https://jars.interlis.ch/')
    }
}

configurations {
    xlsx
    validator
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.1'
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.17.1'
    implementation 'ch.interlis:iox-ili:1.24.1'
    implementation 'ch.interlis:ili2c-core:5.6.6'
    implementation 'ch.interlis:ili2c-tool:5.6.6'
    implementation 'info.picocli:picocli:4.7.6'
    implementation 'org.slf4j:slf4j-api:2.0.17'
    runtimeOnly 'org.slf4j:slf4j-simple:2.0.17'

    compileOnly 'org.apache.poi:poi-ooxml:5.4.0'
    xlsx 'org.apache.poi:poi-ooxml:5.4.0'

    validator 'ch.interlis:ilivalidator:1.15.0'

    compileOnly 'ch.interlis:ilivalidator:1.15.0'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.assertj:assertj-core:3.25.3'
    testImplementation 'org.mockito:mockito-core:5.12.0'
    testImplementation 'org.apache.poi:poi-ooxml:5.4.0'
    testImplementation 'ch.interlis:ilivalidator:1.15.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'guru.interlis.transformer.app.CliMain'
}

sourceSets {
    integrationTest {
        java {
            srcDir file('src/integrationTest/java')
        }
        resources {
            srcDir file('src/integrationTest/resources')
        }
        compileClasspath += sourceSets.main.output + sourceSets.test.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
    realDataTest {
        java {
            srcDir file('src/realDataTest/java')
        }
        resources {
            srcDir file('src/realDataTest/resources')
        }
        compileClasspath += sourceSets.main.output + sourceSets.test.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

// -- DM01/DMAV tasks --------------------------------------------------------

tasks.register('importDmavCorrelation', JavaExec) {
    group = 'dm01-dmav'
    description = 'Import DM01/DMAV correlation hints from XLSX'
    classpath = sourceSets.main.runtimeClasspath + configurations.xlsx
    mainClass = 'guru.interlis.transformer.dmav.CorrelationImportTask'
    args = [
        '--xlsx', 'docs/dm01-dmav/DMAV_Korrelationstabelle_20260301.xlsx',
        '--out', 'build/generated/dm01-dmav/correlation-hints.json',
        '--report', 'build/reports/dm01-dmav/correlation-import-report.md'
    ]
}

tasks.register('importCorrelation', JavaExec) {
    group = 'dm01-dmav'
    description = 'Alias for importDmavCorrelation — import DM01/DMAV correlation hints from XLSX'
    classpath = sourceSets.main.runtimeClasspath + configurations.xlsx
    mainClass = 'guru.interlis.transformer.dmav.CorrelationImportTask'
    args = [
        '--xlsx', 'docs/dm01-dmav/DMAV_Korrelationstabelle_20260301.xlsx',
        '--out', 'build/generated/dm01-dmav/correlation-hints.json',
        '--report', 'build/reports/dm01-dmav/correlation-import-report.md'
    ]
}

tasks.register('generateDm01DmavMappings', JavaExec) {
    group = 'dm01-dmav'
    description = 'Generate DM01/DMAV mapping candidates from correlation hints'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.dmav.MappingCandidateTask'
    args = [
        '--hints', 'build/generated/dm01-dmav/correlation-hints.json',
        '--out', 'build/generated/dm01-dmav/mapping-candidates.json',
        '--report', 'build/reports/dm01-dmav/candidate-report.md',
        '--dm01-model', 'DM01AVCH24LV95D',
        '--dm01-dir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--dmav-model', 'DMAV_FixpunkteAVKategorie3_V1_1',
        '--dmav-dir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--yaml-dm01-dmav', 'build/generated/dm01-dmav/dm01-to-dmav.generated.yaml',
        '--yaml-dmav-dm01', 'build/generated/dm01-dmav/dmav-to-dm01.generated.yaml'
    ]
}

tasks.register('generateMappingCandidates', JavaExec) {
    group = 'dm01-dmav'
    description = 'Alias for generateDm01DmavMappings — generate DM01/DMAV mapping candidates from correlation hints'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.dmav.MappingCandidateTask'
    args = [
        '--hints', 'build/generated/dm01-dmav/correlation-hints.json',
        '--out', 'build/generated/dm01-dmav/mapping-candidates.json',
        '--report', 'build/reports/dm01-dmav/candidate-report.md',
        '--dm01-model', 'DM01AVCH24LV95D',
        '--dm01-dir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--dmav-model', 'DMAV_FixpunkteAVKategorie3_V1_1',
        '--dmav-dir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--yaml-dm01-dmav', 'build/generated/dm01-dmav/dm01-to-dmav.generated.yaml',
        '--yaml-dmav-dm01', 'build/generated/dm01-dmav/dmav-to-dm01.generated.yaml'
    ]
}

tasks.register('topicGapReport', JavaExec) {
    group = 'dm01-dmav'
    description = 'Generate DM01/DMAV topic gap analysis report (Phase 14)'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.dmav.TopicGapReportTask'
    args = [
        '--hints', 'build/generated/dm01-dmav/correlation-hints.json',
        '--candidates', 'build/generated/dm01-dmav/mapping-candidates.json',
        '--report', 'build/reports/dm01-dmav/topic-gap-report.md',
        '--dm01-model', 'DM01AVCH24LV95D',
        '--dm01-dir', 'src/test/data/av/models/'
    ]
}

tasks.register('validateGoldenTransfers', JavaExec) {
    group = 'verification'
    description = 'Validate ITF/XTF output with ilivalidator (alias for validateOutput)'
    classpath = configurations.validator + sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.app.IlivalidatorRunner'
    args = [
        '--file', 'build/out/dmav-lfp3.xtf',
        '--modeldir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--model', 'DMAV_FixpunkteAVKategorie3_V1_1',
        '--log', 'build/reports/ilivalidator/validation.log'
    ]
}

tasks.register('validateOutput', JavaExec) {
    group = 'verification'
    description = 'Alias for validateGoldenTransfers — validate ITF/XTF output with ilivalidator'
    classpath = configurations.validator + sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.app.IlivalidatorRunner'
    args = [
        '--file', 'build/out/dmav-lfp3.xtf',
        '--modeldir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--model', 'DMAV_FixpunkteAVKategorie3_V1_1',
        '--log', 'build/reports/ilivalidator/validation.log'
    ]
}

tasks.register('generateModelInventory', JavaExec) {
    group = 'ili-transformer'
    description = 'Generate INTERLIS model inventory as JSON and Markdown via inspect-model'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.app.CliMain'
    args = ['inspect-model',
        '--model', 'DMAV_FixpunkteAVKategorie3_V1_1',
        '--modeldir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--output', 'build/reports/model-inventory/dmav-fp3',
        '--format', 'both'
    ]
}

// -- integrationTest task --------------------------------------------------

tasks.register('integrationTest', Test) {
    description = 'Runs integration tests (in src/integrationTest)'
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    useJUnitPlatform()
}

tasks.register('realDataTest', Test) {
    description = 'Runs real data validation tests (slow, not part of check)'
    group = 'verification'
    testClassesDirs = sourceSets.realDataTest.output.classesDirs
    classpath = sourceSets.realDataTest.runtimeClasspath
    useJUnitPlatform()
}

tasks.register('generateFeatureMatrix', JavaExec) {
    group = 'documentation'
    description = 'Generate feature matrix as Markdown and JSON'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.feature.FeatureMatrixTask'
    args = [
        '--markdown', 'build/reports/feature-matrix.md',
        '--json', 'build/reports/feature-matrix.json'
    ]
}

check.dependsOn integrationTest
