plugins {
    id 'application'
    id 'java'
}

group = 'guru.interlis'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
    maven {
        url = uri('https://jars.interlis.ch/')
    }
}

configurations {
    xlsx
    validator
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.1'
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.17.1'
    implementation 'ch.interlis:iox-ili:1.24.1'
    implementation 'ch.interlis:ili2c-core:5.6.6'
    implementation 'ch.interlis:ili2c-tool:5.6.6'
    implementation 'info.picocli:picocli:4.7.6'
    implementation 'org.slf4j:slf4j-api:2.0.17'
    runtimeOnly 'org.slf4j:slf4j-simple:2.0.17'

    compileOnly 'org.apache.poi:poi-ooxml:5.4.0'
    xlsx 'org.apache.poi:poi-ooxml:5.4.0'

    validator 'ch.interlis:ilivalidator:1.15.0'

    compileOnly 'ch.interlis:ilivalidator:1.15.0'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.assertj:assertj-core:3.25.3'
    testImplementation 'org.mockito:mockito-core:5.12.0'
    testImplementation 'org.apache.poi:poi-ooxml:5.4.0'
    testImplementation 'ch.interlis:ilivalidator:1.15.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'guru.interlis.transformer.app.CliMain'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.register('importCorrelation', JavaExec) {
    group = 'dm01-dmav'
    description = 'Import DM01↔DMAV correlation hints from XLSX'
    classpath = sourceSets.main.runtimeClasspath + configurations.xlsx
    mainClass = 'guru.interlis.transformer.dmav.CorrelationImportTask'
    args = [
        '--xlsx', 'docs/dm01-dmav/DMAV_Korrelationstabelle_20260301.xlsx',
        '--out', 'build/generated/dm01-dmav/correlation-hints.json',
        '--report', 'build/reports/dm01-dmav/correlation-import-report.md'
    ]
}

tasks.register('generateMappingCandidates', JavaExec) {
    group = 'dm01-dmav'
    description = 'Generate DM01↔DMAV mapping candidates from correlation hints'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.dmav.MappingCandidateTask'
    args = [
        '--hints', 'build/generated/dm01-dmav/correlation-hints.json',
        '--out', 'build/generated/dm01-dmav/mapping-candidates.json',
        '--report', 'build/reports/dm01-dmav/candidate-report.md',
        '--dm01-model', 'DM01AVCH24LV95D',
        '--dm01-dir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--dmav-model', 'DMAV_FixpunkteAVKategorie3_V1_1',
        '--dmav-dir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--yaml-dm01-dmav', 'build/generated/dm01-dmav/dm01-to-dmav.generated.yaml',
        '--yaml-dmav-dm01', 'build/generated/dm01-dmav/dmav-to-dm01.generated.yaml'
    ]
}

tasks.register('validateOutput', JavaExec) {
    group = 'verification'
    description = 'Validate ITF/XTF output with ilivalidator'
    classpath = configurations.validator + sourceSets.main.runtimeClasspath
    mainClass = 'guru.interlis.transformer.app.IlivalidatorRunner'
    args = [
        '--file', 'build/out/dmav-lfp3.xtf',
        '--modeldir', 'src/test/data/av/models/;https://models.interlis.ch',
        '--model', 'DMAV_FixpunkteAVKategorie3_V1_1',
        '--log', 'build/reports/ilivalidator/validation.log'
    ]
}
