version: 1

job:
  name: dm01-to-dmav-lfp3-test
  description: "Test transformation for enumMap + div + refs"
  direction: dm01-to-dmav
  failPolicy: strict
  inputs:
    - id: dm01
      path: "input/test.itf"
      model: "Dm01TestModel"
      format: "itf"
  outputs:
    - id: dmav
      path: "build/out/dmav-test.xtf"
      model: "DmavTestModel"
      format: "xtf"

mapping:
  oidStrategy:
    default: deterministicUuid
    namespace: "test-lfp3"
  basketStrategy:
    default: preserveOrGenerateUuid

  enums:
    Zuverlaessigkeit_DM01_DMAV:
      ja: "true"
      nein: "false"
    Versicherungsart_DM01_DMAV:
      Stein: "Stein"
      Kunststoffzeichen: "Kunststoffzeichen"
      Bolzen: "Bolzen"
      Rohr: "Rohr"
      Pfahl: "Pfahl"
      Kreuz: "Kreuz"
      unversichert: "unversichert"
      weitere: "weitere"
    HAlignment_DM01_DMAV:
      Left: "Left"
      Center: "Center"
      Right: "Right"
    VAlignment_DM01_DMAV:
      Top: "Top"
      Cap: "Cap"
      Half: "Half"
      Baseline: "Baseline"
      Bottom: "Bottom"

  rules:
    - id: lfp3-nachfuehrung
      target:
        output: dmav
        class: "DmavTestModel.Fixpunkte.LFP3Nachfuehrung"
      sources:
        - alias: nf
          input: dm01
          class: "Dm01TestModel.Fixpunkte.LFP3Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 60)"
        GueltigerEintrag: "toXmlDateTime(coalesce(nf.GueltigerEintrag, now()))"

    - id: lfp3
      target:
        output: dmav
        class: "DmavTestModel.Fixpunkte.LFP3"
      sources:
        - alias: p
          input: dm01
          class: "Dm01TestModel.Fixpunkte.LFP3"
      identity:
        sourceKey: ["p.NBIdent", "p.Nummer"]
      assign:
        NBIdent: "p.NBIdent"
        Nummer: "p.Nummer"
        LFPArt: "#LFP3"
        Geometrie: "p.Geometrie"
        Hoehengeometrie: "p.Hoehengeometrie"
        Lagegenauigkeit: "div(p.Lagegenauigkeit, 100.0)"
        IstLagezuverlaessig: "enumMap(p.IstLagezuverlaessig, 'Zuverlaessigkeit_DM01_DMAV')"
        Hoehengenauigkeit: "div(p.Hoehengenauigkeit, 100.0)"
        IstHoehenzuverlaessig: "enumMap(p.IstHoehenzuverlaessig, 'Zuverlaessigkeit_DM01_DMAV')"
        Punktzeichen: "enumMap(p.Punktzeichen, 'Versicherungsart_DM01_DMAV')"
        Grenzpunktfunktion: "#keine"
        AktiverUnterhalt: "true"
      bags:
        Textposition:
          from:
            input: dm01
            class: "Dm01TestModel.Fixpunkte.LFP3Pos"
            alias: pos
            where: "refEquals(pos.LFP3Pos_von, p)"
          structure: "DmavTestModel.Fixpunkte.Textposition"
          assign:
            Position: "pos.Pos"
            Orientierung: "coalesce(pos.Ori, 100.0)"
            HReferenzpunkt: "enumMap(coalesce(pos.HAli, 'Left'), 'HAlignment_DM01_DMAV')"
            VReferenzpunkt: "enumMap(coalesce(pos.VAli, 'Baseline'), 'VAlignment_DM01_DMAV')"
      refs:
        - association: "Entstehung_LFP3"
          role: "Entstehung"
          targetObject:
            rule: lfp3-nachfuehrung
            sourceRef: "p.Entstehung"
