version: 1

job:
  name: dm01-to-dmav-rohrleitungen
  description: "Pilot-Transformation DM01 Rohrleitungen nach DMAV Rohrleitungen"
  direction: dm01-to-dmav
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "models/"
  inputs:
    - id: dm01
      path: "input/dm01.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"
  outputs:
    - id: dmav
      path: "build/out/dmav-rohrleitungen.xtf"
      model: "DMAV_Rohrleitungen_V1_1"
      format: "xtf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: deterministicUuid
    namespace: "dm01-to-dmav-rohrleitungen"
  basketStrategy:
    default: byTopic

  enums:
    Medium_DM01_DMAV:
      Oel: "Oel"
      Gas: "Gas"
      weitere: "weitere"
    Qualitaetsstandard_DM01_DMAV:
      AV93: "AV93"
      PV74: "PN"
      PN: "PN"
      PEP: "PN"
      weitere: "PN"
    Punktart_Signalart:
      Signal: "Signal"
      Tafel_Stein: "Tafel_Stein"
      weitere: "weitere"
    Schriftgroesse_DM01_DMAV:
      klein: "Klein"
      mittel: "Mittel"
      gross: "Gross"

  rules:
    - id: rl-nachfuehrung
      target:
        output: dmav
        class: "DMAV_Rohrleitungen_V1_1.Rohrleitungen.RLNachfuehrung"
      sources:
        - alias: rl
          input: dm01
          class: "DM01AVCH24LV95D.Rohrleitungen.RLNachfuehrung"
      identity:
        sourceKey: ["rl.NBIdent", "rl.Identifikator"]
      assign:
        NBIdent: "rl.NBIdent"
        Identifikator: "rl.Identifikator"
        Beschreibung: "truncate(rl.Beschreibung, 60)"
        GueltigerEintrag: "toXmlDateTime(coalesce(rl.GueltigerEintrag, '2024-01-01'))"

    - id: leitungsobjekt
      target:
        output: dmav
        class: "DMAV_Rohrleitungen_V1_1.Rohrleitungen.Leitungsobjekt"
      sources:
        - alias: lo
          input: dm01
          class: "DM01AVCH24LV95D.Rohrleitungen.Leitungsobjekt"
      identity:
        sourceKey: ["lo.Betreiber"]
      assign:
        Betreiber: "lo.Betreiber"
        Qualitaetsstandard: "enumMap(coalesce(lo.Qualitaet, 'PN'), 'Qualitaetsstandard_DM01_DMAV')"
        Medium: "enumMap(coalesce(lo.Art, 'Gas'), 'Medium_DM01_DMAV')"
        Objektstatus: "'real'"
      bags:
        Punktelement:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Rohrleitungen.Punktelement"
            alias: pe
          parentRef:
            attribute: Punktelement_von
            parentAlias: lo
          assign:
            Geometrie: "pe.Geometrie"
            SymbolOri: "pe.Ori"
        Textposition:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Rohrleitungen.LeitungsobjektPos"
            alias: lop
          parentRef:
            attribute: LeitungsobjektPos_von
            parentAlias: lo
          assign:
            Position: "lop.Pos"
            Orientierung: "coalesce(lop.Ori, '100.0')"
            HReferenzpunkt: "coalesce(lop.HAli, 'Center')"
            VReferenzpunkt: "coalesce(lop.VAli, 'Half')"
            Textgroesse: "enumMap(coalesce(lop.Groesse, 'mittel'), 'Schriftgroesse_DM01_DMAV')"
      refs:
        - association: "Entstehung_Leitungsobjekt"
          role: "Entstehung"
          required: true
          targetObject:
            rule: rl-nachfuehrung
            sourceRef: "lo.Entstehung"

    - id: signal
      target:
        output: dmav
        class: "DMAV_Rohrleitungen_V1_1.Rohrleitungen.Signal"
      sources:
        - alias: sp
          input: dm01
          class: "DM01AVCH24LV95D.Rohrleitungen.Signalpunkt"
      identity:
        sourceKey: ["sp.Nummer"]
      assign:
        Nummer: "sp.Nummer"
        Betreiber: "sp.Betreiber"
        Geometrie: "sp.Geometrie"
        Qualitaetsstandard: "enumMap(coalesce(sp.Qualitaet, 'PN'), 'Qualitaetsstandard_DM01_DMAV')"
        Medium: "enumMap(coalesce(sp.Art, 'Gas'), 'Medium_DM01_DMAV')"
        Objektstatus: "'real'"
        Signalart: "enumMap(coalesce(sp.Punktart, 'Signal'), 'Punktart_Signalart')"
      bags:
        Textposition:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Rohrleitungen.SignalpunktPos"
            alias: spp
          parentRef:
            attribute: SignalpunktPos_von
            parentAlias: sp
          assign:
            Position: "spp.Pos"
            Orientierung: "coalesce(spp.Ori, '100.0')"
            HReferenzpunkt: "coalesce(spp.HAli, 'Center')"
            VReferenzpunkt: "coalesce(spp.VAli, 'Half')"
      refs:
        - association: "Entstehung_Signal"
          role: "Entstehung"
          required: true
          targetObject:
            rule: rl-nachfuehrung
            sourceRef: "sp.Entstehung"

    - id: messpunkt
      target:
        output: dmav
        class: "DMAV_Rohrleitungen_V1_1.Rohrleitungen.Messpunkt"
      sources:
        - alias: ep
          input: dm01
          class: "DM01AVCH24LV95D.Rohrleitungen.Einzelpunkt"
      identity:
        sourceKey: ["ep.Identifikator"]
      assign:
        Nummer: "coalesce(ep.Identifikator, '')"
        Geometrie: "ep.Geometrie"
        Lagegenauigkeit: "mul(ep.LageGen, 0.01)"
        IstLagezuverlaessig: "'true'"
        IstExaktDefiniert: "'true'"
      refs:
        - association: "Entstehung_Messpunkt"
          role: "Entstehung"
          required: false
          targetObject:
            rule: rl-nachfuehrung
            sourceRef: "ep.Entstehung"
