version: 1

job:
  name: dm01-to-dmav-bb
  description: "Pilot-Transformation DM01 Bodenbedeckung nach DMAV Bodenbedeckung"
  direction: dm01-to-dmav
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "models/"
  inputs:
    - id: dm01
      path: "input/dm01.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"
  outputs:
    - id: dmav
      path: "build/out/dmav-bb.xtf"
      model: "DMAV_Bodenbedeckung_V1_1"
      format: "xtf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: deterministicUuid
    namespace: "dm01-to-dmav-bb"
  basketStrategy:
    default: byTopic

  enums:
    Zuverlaessigkeit_DM01_DMAV:
      ja: true
      nein: false

  rules:
    - id: bb-nachfuehrung
      target:
        output: dmav
        class: "DMAV_Bodenbedeckung_V1_1.Bodenbedeckung.BBNachfuehrung"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.Bodenbedeckung.BBNachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 60)"
        Perimeter: "nf.Perimeter"
        GueltigerEintrag: "toXmlDateTime(coalesce(nf.GueltigerEintrag, nf.Datum1))"

    - id: boflaeche
      target:
        output: dmav
        class: "DMAV_Bodenbedeckung_V1_1.Bodenbedeckung.Bodenbedeckung"
      sources:
        - alias: bb
          input: dm01
          class: "DM01AVCH24LV95D.Bodenbedeckung.BoFlaeche"
      assign:
        Geometrie: "bb.Geometrie"
        Qualitaetsstandard: "bb.Qualitaet"
        Bodenbedeckungsart: "bb.Art"
        Fiktiv: "false"
        Objektstatus: "#weitere"
      refs:
        - association: "Entstehung_Bodenbedeckung"
          role: "Entstehung"
          required: false
          targetObject:
            rule: bb-nachfuehrung
            sourceRef: "bb.Entstehung"

    - id: einzelpunkt
      target:
        output: dmav
        class: "DMAV_Bodenbedeckung_V1_1.Bodenbedeckung.Messpunkt"
      sources:
        - alias: ep
          input: dm01
          class: "DM01AVCH24LV95D.Bodenbedeckung.Einzelpunkt"
      identity:
        sourceKey: ["ep.Identifikator"]
      assign:
        Nummer: "ep.Identifikator"
        Geometrie: "ep.Geometrie"
        Lagegenauigkeit: "div(ep.LageGen, 100.0)"
        IstLagezuverlaessig: "enumMap(ep.LageZuv, 'Zuverlaessigkeit_DM01_DMAV')"
        IstExaktDefiniert: "ep.ExaktDefiniert"
      refs:
        - association: "Entstehung_Messpunkt"
          role: "Entstehung"
          required: false
          targetObject:
            rule: bb-nachfuehrung
            sourceRef: "ep.Entstehung"
