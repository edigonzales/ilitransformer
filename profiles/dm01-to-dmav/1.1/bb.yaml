version: 1

job:
  name: dm01-to-dmav-bb
  description: "Pilot-Transformation DM01 Bodenbedeckung nach DMAV Bodenbedeckung"
  direction: dm01-to-dmav
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "models/"
  inputs:
    - id: dm01
      path: "input/dm01.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"
  outputs:
    - id: dmav
      path: "build/out/dmav-bb.xtf"
      model: "DMAV_Bodenbedeckung_V1_1"
      format: "xtf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: deterministicUuid
    namespace: "dm01-to-dmav-bb"
  basketStrategy:
    default: byTopic

  enums:
    Zuverlaessigkeit_DM01_DMAV:
      ja: true
      nein: false
    ExaktDefiniert_DM01_DMAV:
      Ja: true
      Nein: false
    Schriftgroesse_DM01_DMAV:
      klein: Klein
      mittel: Mittel
      gross: Gross
    Bodenbedeckungsart_DM01_DMAV:
      Gebaeude: "Gebaeude"
      befestigt.Strasse_Weg: "befestigt.Strasse_Weg"
      befestigt.Trottoir: "befestigt.Trottoir"
      befestigt.Verkehrsinsel: "befestigt.Verkehrsinsel"
      befestigt.Bahn: "befestigt.Bahn"
      befestigt.Flugplatz: "befestigt.Flugplatz"
      befestigt.Wasserbecken: "befestigt.Wasserbecken"
      befestigt.uebrige_befestigte: "befestigt.uebrige_befestigte"
      humusiert.Acker_Wiese_Weide: "humusiert.Acker_Wiese_Weide"
      humusiert.Intensivkultur.Reben: "humusiert.Intensivkultur.Reben"
      humusiert.Intensivkultur.uebrige_Intensivkultur: "humusiert.Intensivkultur.uebrige_Intensivkultur"
      humusiert.Gartenanlage: "humusiert.Gartenanlage"
      humusiert.Hoch_Flachmoor: "humusiert.Hoch_Flachmoor"
      humusiert.uebrige_humusierte: "humusiert.uebrige_humusierte"
      Gewaesser.stehendes: "Gewaesser.stehendes_Gewaesser"
      Gewaesser.fliessendes: "Gewaesser.fliessendes_Gewaesser"
      Gewaesser.Schilfguertel: "Gewaesser.Schilfguertel"
      bestockt.geschlossener_Wald: "bestockt.geschlossener_Wald"
      bestockt.Wytweide.Wytweide_dicht: "bestockt.Wytweide.Wytweide_dicht"
      bestockt.Wytweide.Wytweide_offen: "bestockt.Wytweide.Wytweide_offen"
      bestockt.uebrige_bestockte: "bestockt.uebrige_bestockte"
      vegetationslos.Fels: "vegetationslos.Fels"
      vegetationslos.Gletscher_Firn: "vegetationslos.Gletscher_Firn"
      vegetationslos.Geroell_Sand: "vegetationslos.Geroell_Sand"
      vegetationslos.Abbau_Deponie: "vegetationslos.Abbau_Deponie"
      vegetationslos.uebrige_vegetationslose: "vegetationslos.uebrige_vegetationslose"

  rules:
    - id: bb-nachfuehrung-gueltig
      target:
        output: dmav
        class: "DMAV_Bodenbedeckung_V1_1.Bodenbedeckung.BBNachfuehrung"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.Bodenbedeckung.BBNachfuehrung"
          where: "if(notDefined(nf.Gueltigkeit), true, nf.Gueltigkeit != #projektiert)"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 60)"
        Perimeter: "nf.Perimeter"
        GueltigerEintrag: "toXmlDateTime(coalesce(nf.GueltigerEintrag, nf.Datum1))"

    - id: bb-nachfuehrung-projektiert
      target:
        output: dmav
        class: "DMAV_Bodenbedeckung_V1_1.Bodenbedeckung.BBNachfuehrung"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.Bodenbedeckung.BBNachfuehrung"
          where: "nf.Gueltigkeit == #projektiert"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 60)"
        Perimeter: "nf.Perimeter"
        GueltigerEintrag: "toXmlDateTime(coalesce(nf.GueltigerEintrag, nf.Datum1))"

    - id: boflaeche-gueltig
      target:
        output: dmav
        class: "DMAV_Bodenbedeckung_V1_1.Bodenbedeckung.Bodenbedeckung"
      sources:
        - alias: bb
          input: dm01
          class: "DM01AVCH24LV95D.Bodenbedeckung.BoFlaeche"
      assign:
        Geometrie: "bb.Geometrie"
        Qualitaetsstandard: "bb.Qualitaet"
        Bodenbedeckungsart: "enumMap(bb.Art, 'Bodenbedeckungsart_DM01_DMAV')"
        Fiktiv: "false"
        Objektstatus: "#real"
        EGID: "if(bb.Art == #Gebaeude, lookupOptional('DM01AVCH24LV95D.Bodenbedeckung.Gebaeudenummer', 'Gebaeudenummer_von', oid(bb), 'GWR_EGID'), null)"
      bags:
        Objektnummer:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Bodenbedeckung.Gebaeudenummer"
            alias: gn
          parentRef:
            attribute: Gebaeudenummer_von
            parentAlias: bb
          assign:
            Nummer: "gn.Nummer"
          nestedBags:
            Textposition:
              from:
                input: dm01
                class: "DM01AVCH24LV95D.Bodenbedeckung.GebaeudenummerPos"
                alias: gnp
              parentRef:
                attribute: GebaeudenummerPos_von
                parentAlias: gn
              assign:
                Position: "gnp.Pos"
                Orientierung: "coalesce(gnp.Ori, 100.0)"
                HReferenzpunkt: "coalesce(gnp.HAli, 'Center')"
                VReferenzpunkt: "coalesce(gnp.VAli, 'Half')"
                Textgroesse: "enumMap(coalesce(gnp.Groesse, 'mittel'), 'Schriftgroesse_DM01_DMAV')"
        Objektname:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Bodenbedeckung.Objektname"
            alias: on
          parentRef:
            attribute: Objektname_von
            parentAlias: bb
          assign:
            Name: "on.Name"
          nestedBags:
            Textposition:
              from:
                input: dm01
                class: "DM01AVCH24LV95D.Bodenbedeckung.ObjektnamePos"
                alias: onp
              parentRef:
                attribute: ObjektnamePos_von
                parentAlias: on
              assign:
                Position: "onp.Pos"
                Orientierung: "coalesce(onp.Ori, 100.0)"
                HReferenzpunkt: "coalesce(onp.HAli, 'Center')"
                VReferenzpunkt: "coalesce(onp.VAli, 'Half')"
                Textgroesse: "enumMap(coalesce(onp.Groesse, 'mittel'), 'Schriftgroesse_DM01_DMAV')"
        Symbolposition:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Bodenbedeckung.BoFlaecheSymbol"
            alias: sym
          parentRef:
            attribute: BoFlaecheSymbol_von
            parentAlias: bb
          assign:
            Position: "sym.Pos"
            Orientierung: "coalesce(sym.Ori, 100.0)"
      refs:
        - association: "Entstehung_Bodenbedeckung"
          role: "Entstehung"
          required: true
          targetObject:
            rule: bb-nachfuehrung-gueltig
            sourceRef: "bb.Entstehung"

    - id: boflaeche-projektiert
      target:
        output: dmav
        class: "DMAV_Bodenbedeckung_V1_1.Bodenbedeckung.Bodenbedeckung"
      sources:
        - alias: bb
          input: dm01
          class: "DM01AVCH24LV95D.Bodenbedeckung.ProjBoFlaeche"
      assign:
        Geometrie: "bb.Geometrie"
        Qualitaetsstandard: "bb.Qualitaet"
        Bodenbedeckungsart: "enumMap(bb.Art, 'Bodenbedeckungsart_DM01_DMAV')"
        Fiktiv: "false"
        Objektstatus: "#projektiert"
        EGID: "if(bb.Art == #Gebaeude, lookupOptional('DM01AVCH24LV95D.Bodenbedeckung.ProjGebaeudenummer', 'ProjGebaeudenummer_von', oid(bb), 'GWR_EGID'), null)"
      bags:
        Objektnummer:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Bodenbedeckung.ProjGebaeudenummer"
            alias: gn
          parentRef:
            attribute: ProjGebaeudenummer_von
            parentAlias: bb
          assign:
            Nummer: "gn.Nummer"
          nestedBags:
            Textposition:
              from:
                input: dm01
                class: "DM01AVCH24LV95D.Bodenbedeckung.ProjGebaeudenummerPos"
                alias: gnp
              parentRef:
                attribute: ProjGebaeudenummerPos_von
                parentAlias: gn
              assign:
                Position: "gnp.Pos"
                Orientierung: "coalesce(gnp.Ori, 100.0)"
                HReferenzpunkt: "coalesce(gnp.HAli, 'Center')"
                VReferenzpunkt: "coalesce(gnp.VAli, 'Half')"
                Textgroesse: "enumMap(coalesce(gnp.Groesse, 'mittel'), 'Schriftgroesse_DM01_DMAV')"
        Objektname:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Bodenbedeckung.ProjObjektname"
            alias: on
          parentRef:
            attribute: ProjObjektname_von
            parentAlias: bb
          assign:
            Name: "on.Name"
          nestedBags:
            Textposition:
              from:
                input: dm01
                class: "DM01AVCH24LV95D.Bodenbedeckung.ProjObjektnamePos"
                alias: onp
              parentRef:
                attribute: ProjObjektnamePos_von
                parentAlias: on
              assign:
                Position: "onp.Pos"
                Orientierung: "coalesce(onp.Ori, 100.0)"
                HReferenzpunkt: "coalesce(onp.HAli, 'Center')"
                VReferenzpunkt: "coalesce(onp.VAli, 'Half')"
                Textgroesse: "enumMap(coalesce(onp.Groesse, 'mittel'), 'Schriftgroesse_DM01_DMAV')"
        Symbolposition:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Bodenbedeckung.ProjBoFlaecheSymbol"
            alias: sym
          parentRef:
            attribute: ProjBoFlaecheSymbol_von
            parentAlias: bb
          assign:
            Position: "sym.Pos"
            Orientierung: "coalesce(sym.Ori, 100.0)"
      refs:
        - association: "Entstehung_Bodenbedeckung"
          role: "Entstehung"
          required: true
          targetObject:
            rule: bb-nachfuehrung-projektiert
            sourceRef: "bb.Entstehung"

    - id: einzelpunkt
      target:
        output: dmav
        class: "DMAV_Bodenbedeckung_V1_1.Bodenbedeckung.Messpunkt"
      sources:
        - alias: ep
          input: dm01
          class: "DM01AVCH24LV95D.Bodenbedeckung.Einzelpunkt"
      identity:
        sourceKey: ["ep.Identifikator"]
      assign:
        Nummer: "ep.Identifikator"
        Geometrie: "ep.Geometrie"
        Lagegenauigkeit: "div(ep.LageGen, 100.0)"
        IstLagezuverlaessig: "enumMap(ep.LageZuv, 'Zuverlaessigkeit_DM01_DMAV')"
        IstExaktDefiniert: "enumMap(ep.ExaktDefiniert, 'ExaktDefiniert_DM01_DMAV')"
      refs:
        - association: "Entstehung_Messpunkt"
          role: "Entstehung"
          required: false
          targetObject:
            rule: bb-nachfuehrung-gueltig
            sourceRef: "ep.Entstehung"
