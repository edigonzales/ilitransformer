version: 1

job:
  name: dm01-to-dmav-dbv
  description: "Pilot-Transformation DM01 Rutschgebiete nach DMAV DauerndeBodenverschiebungen"
  direction: dm01-to-dmav
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "models/"
  inputs:
    - id: dm01
      path: "input/dm01.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"
  outputs:
    - id: dmav
      path: "build/out/dmav-dbv.xtf"
      model: "DMAV_DauerndeBodenverschiebungen_V1_1"
      format: "xtf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: deterministicUuid
    namespace: "dm01-to-dmav-dbv"
  basketStrategy:
    default: byTopic

  enums:
    Schriftgroesse_DM01_DMAV:
      klein: Klein
      mittel: Mittel
      gross: Gross

  rules:
    - id: dbv-nachfuehrung-gueltig
      target:
        output: dmav
        class: "DMAV_DauerndeBodenverschiebungen_V1_1.DauerndeBodenverschiebungen.DBVNachfuehrung"
      sources:
        - alias: r
          input: dm01
          class: "DM01AVCH24LV95D.Rutschgebiete.Rutschung"
      identity:
        sourceKey: ["r.NBIdent", "r.Identifikator"]
      assign:
        NBIdent: "r.NBIdent"
        Identifikator: "r.Identifikator"
        Beschreibung: "truncate(coalesce(r.Name, ''), 60)"
        Perimeter: "r.Geometrie"
        GueltigerEintrag: "toXmlDateTime(coalesce(r.GueltigerEintrag, '2000-01-01'))"

    - id: dauerndebodenverschiebung-gueltig
      target:
        output: dmav
        class: "DMAV_DauerndeBodenverschiebungen_V1_1.DauerndeBodenverschiebungen.DauerndeBodenverschiebung"
      sources:
        - alias: r
          input: dm01
          class: "DM01AVCH24LV95D.Rutschgebiete.Rutschung"
      identity:
        sourceKey: ["r.NBIdent", "r.Identifikator"]
      assign:
        NBIdent: "r.NBIdent"
        Identifikator: "r.Identifikator"
        Beschreibung: "truncate(coalesce(r.Name, ''), 60)"
        Geometrie: "r.Geometrie"
      bags:
        Textposition:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Rutschgebiete.RutschungPos"
            alias: rp
          parentRef:
            attribute: RutschungPos_von
            parentAlias: r
          assign:
            Position: "rp.Pos"
            Orientierung: "coalesce(rp.Ori, 100.0)"
            HReferenzpunkt: "coalesce(rp.HAli, 'Center')"
            VReferenzpunkt: "coalesce(rp.VAli, 'Half')"
            Textgroesse: "enumMap(coalesce(rp.Groesse, 'mittel'), 'Schriftgroesse_DM01_DMAV')"
      refs:
        - association: "Entstehung_DauerndeBodenverschiebung"
          role: "Entstehung"
          required: true
          targetObject:
            rule: dbv-nachfuehrung-gueltig
            sourceRef: "r"
