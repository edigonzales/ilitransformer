version: 1

job:
  name: dm01-to-dmav-gs
  description: "Pilot-Transformation DM01 Liegenschaften nach DMAV Grundstuecke"
  direction: dm01-to-dmav
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "models/"
  inputs:
    - id: dm01
      path: "input/dm01.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"
  outputs:
    - id: dmav
      path: "build/out/dmav-gs.xtf"
      model: "DMAV_Grundstuecke_V1_1"
      format: "xtf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: deterministicUuid
    namespace: "dm01-to-dmav-gs"
  basketStrategy:
    default: byTopic

  enums:
    Zuverlaessigkeit_DM01_DMAV:
      ja: "true"
      nein: "false"
    JaNein_DM01_DMAV:
      Ja: "true"
      Nein: "false"
    ja_nein_DM01_DMAV:
      ja: "true"
      nein: "false"
    Versicherungsart_DM01_DMAV:
      Stein: "Stein"
      Kunststoffzeichen: "Kunststoffzeichen"
      Bolzen: "Bolzen"
      Rohr: "Rohr"
      Pfahl: "Pfahl"
      Kreuz: "Kreuz"
      unversichert: "unversichert"
      weitere: "weitere"
    Schriftgroesse_DM01_DMAV:
      klein: "Klein"
      mittel: "Mittel"
      gross: "Gross"
    Status_Mutationsart:
      gueltig: "Normal"
      projektiert: "Projektmutation"

  rules:
    - id: gs-nachfuehrung-gueltig
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.GSNachfuehrung"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 60)"
        Perimeter: "nf.Perimeter"
        Mutationsart: "enumMap(coalesce(nf.Gueltigkeit, #gueltig), 'Status_Mutationsart')"
        GueltigerEintrag: "toXmlDateTime(coalesce(nf.GueltigerEintrag, nf.Datum1))"

    - id: grenzpunkt
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grenzpunkt"
      sources:
        - alias: gp
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.Grenzpunkt"
      identity:
        sourceKey: ["gp.Identifikator"]
      assign:
        Nummer: "gp.Identifikator"
        Geometrie: "gp.Geometrie"
        Lagegenauigkeit: "div(gp.LageGen, 100.0)"
        IstLagezuverlaessig: "enumMap(gp.LageZuv, 'Zuverlaessigkeit_DM01_DMAV')"
        Punktzeichen: "enumMap(gp.Punktzeichen, 'Versicherungsart_DM01_DMAV')"
        IstExaktDefiniert: "enumMap(gp.ExaktDefiniert, 'JaNein_DM01_DMAV')"
        IstHoheitsgrenzpunkt: "false"
        IstHoheitsgrenzsteinAlt: "enumMap(gp.HoheitsgrenzsteinAlt, 'ja_nein_DM01_DMAV')"
        SymbolOri: "lookup('DM01AVCH24LV95D.Liegenschaften.GrenzpunktSymbol', 'GrenzpunktSymbol_von', oid(gp), 'Ori')"
      refs:
        - association: "Entstehung_Grenzpunkt"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-gueltig
            sourceRef: "gp.Entstehung"

    - id: grundstueck-gueltig
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grundstueck"
      sources:
        - alias: gs
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.Grundstueck"
          where: "gs.Art == #Liegenschaft"
      identity:
        sourceKey: ["gs.NBIdent", "gs.Nummer"]
      assign:
        NBIdent: "gs.NBIdent"
        Nummer: "gs.Nummer"
        EGRID: "gs.EGRIS_EGRID"
        Grundstuecksart: "#Liegenschaft"
        IstStreitig: "(coalesce(gs.Gueltigkeit, #rechtskraeftig) == #streitig)"
        IstVollstaendig: "(coalesce(gs.Vollstaendigkeit, #Vollstaendig) == #Vollstaendig)"
        Fiktiv: "false"
        Gesamtflaechenmass: "gs.GesamteFlaechenmass"
      bags:
        Textposition:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Liegenschaften.GrundstueckPos"
            alias: pos
            where: "refEquals(pos.GrundstueckPos_von, gs)"
          assign:
            Position: "pos.Pos"
            Orientierung: "coalesce(pos.Ori, 100.0)"
            HReferenzpunkt: "coalesce(pos.HAli, 'Center')"
            VReferenzpunkt: "coalesce(pos.VAli, 'Half')"
            Textgroesse: "enumMap(coalesce(pos.Groesse, 'mittel'), 'Schriftgroesse_DM01_DMAV')"
      refs:
        - association: "Entstehung_Grundstueck"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-gueltig
            sourceRef: "gs.Entstehung"

    - id: liegenschaft
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Liegenschaft"
      sources:
        - alias: ls
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.Liegenschaft"
      assign:
        NummerTeilgrundstueck: "ls.NummerTeilGrundstueck"
        Geometrie: "ls.Geometrie"
        Flaechenmass: "ls.Flaechenmass"
        Fiktiv: "false"
        Qualitaetsstandard: "#AV93"
      refs:
        - association: "GrundstueckLiegenschaft"
          role: "Grundstueck"
          required: true
          targetObject:
            rule: grundstueck-gueltig
            sourceRef: "ls.Liegenschaft_von"
