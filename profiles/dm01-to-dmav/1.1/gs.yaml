version: 1

job:
  name: dm01-to-dmav-gs
  description: "Pilot-Transformation DM01 Liegenschaften nach DMAV Grundstuecke"
  direction: dm01-to-dmav
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "models/"
  inputs:
    - id: dm01
      path: "input/dm01.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"
  outputs:
    - id: dmav
      path: "build/out/dmav-gs.xtf"
      model: "DMAV_Grundstuecke_V1_1"
      format: "xtf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: deterministicUuid
    namespace: "dm01-to-dmav-gs"
  basketStrategy:
    default: byTopic

  enums:
    Zuverlaessigkeit_DM01_DMAV:
      ja: "true"
      nein: "false"
    JaNein_DM01_DMAV:
      Ja: "true"
      Nein: "false"
    ja_nein_DM01_DMAV:
      ja: "true"
      nein: "false"
    Versicherungsart_DM01_DMAV:
      Stein: "Stein"
      Kunststoffzeichen: "Kunststoffzeichen"
      Bolzen: "Bolzen"
      Rohr: "Rohr"
      Pfahl: "Pfahl"
      Kreuz: "Kreuz"
      unversichert: "unversichert"
      weitere: "weitere"
    Schriftgroesse_DM01_DMAV:
      klein: "Klein"
      mittel: "Mittel"
      gross: "Gross"
    Status_Mutationsart:
      gueltig: "Normal"
      projektiert: "Projektmutation"

  rules:
    - id: gs-nachfuehrung-gueltig
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.GSNachfuehrung"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung"
          where: "if(notDefined(nf.Gueltigkeit), true, nf.Gueltigkeit != #projektiert)"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 60)"
        Perimeter: "nf.Perimeter"
        Mutationsart: "enumMap(coalesce(nf.Gueltigkeit, #gueltig), 'Status_Mutationsart')"
        GueltigerEintrag: "toXmlDateTime(coalesce(nf.GueltigerEintrag, nf.Datum1))"

    - id: gs-nachfuehrung-projektiert
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.GSNachfuehrung"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung"
          where: "nf.Gueltigkeit == #projektiert"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 60)"
        Perimeter: "nf.Perimeter"
        Mutationsart: "#Projektmutation"
        GueltigerEintrag: "toXmlDateTime(coalesce(nf.GueltigerEintrag, nf.Datum1))"

    - id: gs-nachfuehrung-gem-gueltig
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.GSNachfuehrung"
      sources:
        - alias: gem
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.GEMNachfuehrung"
          where: "if(notDefined(gem.Gueltigkeit), true, gem.Gueltigkeit != #projektiert) and coalesce(lookupIn('dm01', 'DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung', 'Identifikator', gem.Identifikator, 'NBIdent'), '') != gem.NBIdent"
      identity:
        sourceKey: ["gem.NBIdent", "gem.Identifikator"]
      assign:
        NBIdent: "gem.NBIdent"
        Identifikator: "gem.Identifikator"
        Beschreibung: "truncate(gem.Beschreibung, 60)"
        Perimeter: "gem.Perimeter"
        Mutationsart: "enumMap(coalesce(gem.Gueltigkeit, #gueltig), 'Status_Mutationsart')"
        GueltigerEintrag: "toXmlDateTime(coalesce(gem.GueltigerEintrag, gem.Datum1))"

    - id: gs-nachfuehrung-gem-projektiert
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.GSNachfuehrung"
      sources:
        - alias: gem
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.GEMNachfuehrung"
          where: "gem.Gueltigkeit == #projektiert and coalesce(lookupIn('dm01', 'DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung', 'Identifikator', gem.Identifikator, 'NBIdent'), '') != gem.NBIdent"
      identity:
        sourceKey: ["gem.NBIdent", "gem.Identifikator"]
      assign:
        NBIdent: "gem.NBIdent"
        Identifikator: "gem.Identifikator"
        Beschreibung: "truncate(gem.Beschreibung, 60)"
        Perimeter: "gem.Perimeter"
        Mutationsart: "#Projektmutation"
        GueltigerEintrag: "toXmlDateTime(coalesce(gem.GueltigerEintrag, gem.Datum1))"

    - id: grenzpunkt-gueltig
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grenzpunkt"
      sources:
        - alias: gp
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.Grenzpunkt"
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung"
      joins:
        - left: gp
          right: nf
          on: "eq(gp.Entstehung, nf)"
          type: "inner"
      where: "if(notDefined(nf.Gueltigkeit), true, nf.Gueltigkeit != #projektiert)"
      identity:
        sourceKey: ["gp.Identifikator"]
      assign:
        Nummer: "gp.Identifikator"
        Geometrie: "gp.Geometrie"
        Lagegenauigkeit: "div(gp.LageGen, 100.0)"
        IstLagezuverlaessig: "enumMap(gp.LageZuv, 'Zuverlaessigkeit_DM01_DMAV')"
        Punktzeichen: "enumMap(gp.Punktzeichen, 'Versicherungsart_DM01_DMAV')"
        IstExaktDefiniert: "enumMap(gp.ExaktDefiniert, 'JaNein_DM01_DMAV')"
        IstHoheitsgrenzpunkt: "false"
        IstHoheitsgrenzsteinAlt: "enumMap(gp.HoheitsgrenzsteinAlt, 'ja_nein_DM01_DMAV')"
        SymbolOri: "lookup('DM01AVCH24LV95D.Liegenschaften.GrenzpunktSymbol', 'GrenzpunktSymbol_von', oid(gp), 'Ori')"
      refs:
        - association: "Entstehung_Grenzpunkt"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-gueltig
            sourceRef: "gp.Entstehung"

    - id: grenzpunkt-projektiert
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grenzpunkt"
      sources:
        - alias: gp
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.Grenzpunkt"
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung"
      joins:
        - left: gp
          right: nf
          on: "eq(gp.Entstehung, nf)"
          type: "inner"
      where: "nf.Gueltigkeit == #projektiert"
      identity:
        sourceKey: ["gp.Identifikator"]
      assign:
        Nummer: "gp.Identifikator"
        Geometrie: "gp.Geometrie"
        Lagegenauigkeit: "div(gp.LageGen, 100.0)"
        IstLagezuverlaessig: "enumMap(gp.LageZuv, 'Zuverlaessigkeit_DM01_DMAV')"
        Punktzeichen: "enumMap(gp.Punktzeichen, 'Versicherungsart_DM01_DMAV')"
        IstExaktDefiniert: "enumMap(gp.ExaktDefiniert, 'JaNein_DM01_DMAV')"
        IstHoheitsgrenzpunkt: "false"
        IstHoheitsgrenzsteinAlt: "enumMap(gp.HoheitsgrenzsteinAlt, 'ja_nein_DM01_DMAV')"
        SymbolOri: "lookup('DM01AVCH24LV95D.Liegenschaften.GrenzpunktSymbol', 'GrenzpunktSymbol_von', oid(gp), 'Ori')"
      refs:
        - association: "Entstehung_Grenzpunkt"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-projektiert
            sourceRef: "gp.Entstehung"

    - id: hoheitsgrenzpunkt-ls-gueltig
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grenzpunkt"
      sources:
        - alias: hgp
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.Hoheitsgrenzpunkt"
        - alias: gem
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.GEMNachfuehrung"
        - alias: ls
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung"
      joins:
        - left: hgp
          right: gem
          on: "eq(hgp.Entstehung, gem)"
          type: "inner"
        - left: gem
          right: ls
          on: "eq(gem.Identifikator, ls.Identifikator)"
          type: "left"
      where: "ls.NBIdent == gem.NBIdent and if(notDefined(ls.Gueltigkeit), true, ls.Gueltigkeit != #projektiert)"
      identity:
        sourceKey: ["hgp.Identifikator"]
      assign:
        Nummer: "hgp.Identifikator"
        Geometrie: "hgp.Geometrie"
        Lagegenauigkeit: "div(hgp.LageGen, 100.0)"
        IstLagezuverlaessig: "enumMap(hgp.LageZuv, 'Zuverlaessigkeit_DM01_DMAV')"
        Punktzeichen: "enumMap(hgp.Punktzeichen, 'Versicherungsart_DM01_DMAV')"
        IstExaktDefiniert: "if(coordEquals(hgp.Geometrie, hgp.Geometrie, 0.0), enumMap(hgp.ExaktDefiniert, 'JaNein_DM01_DMAV'), false)"
        IstHoheitsgrenzpunkt: "true"
        IstHoheitsgrenzsteinAlt: "enumMap(hgp.Hoheitsgrenzstein, 'ja_nein_DM01_DMAV')"
        SymbolOri: "lookup('DM01AVCH24LV95D.Gemeindegrenzen.HoheitsgrenzpunktSymbol', 'HoheitsgrenzpunktSymbol_von', oid(hgp), 'Ori')"
      refs:
        - association: "Entstehung_Grenzpunkt"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-gueltig
            sourceRef: "ls"

    - id: hoheitsgrenzpunkt-ls-projektiert
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grenzpunkt"
      sources:
        - alias: hgp
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.Hoheitsgrenzpunkt"
        - alias: gem
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.GEMNachfuehrung"
        - alias: ls
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung"
      joins:
        - left: hgp
          right: gem
          on: "eq(hgp.Entstehung, gem)"
          type: "inner"
        - left: gem
          right: ls
          on: "eq(gem.Identifikator, ls.Identifikator)"
          type: "left"
      where: "ls.NBIdent == gem.NBIdent and ls.Gueltigkeit == #projektiert"
      identity:
        sourceKey: ["hgp.Identifikator"]
      assign:
        Nummer: "hgp.Identifikator"
        Geometrie: "hgp.Geometrie"
        Lagegenauigkeit: "div(hgp.LageGen, 100.0)"
        IstLagezuverlaessig: "enumMap(hgp.LageZuv, 'Zuverlaessigkeit_DM01_DMAV')"
        Punktzeichen: "enumMap(hgp.Punktzeichen, 'Versicherungsart_DM01_DMAV')"
        IstExaktDefiniert: "if(coordEquals(hgp.Geometrie, hgp.Geometrie, 0.0), enumMap(hgp.ExaktDefiniert, 'JaNein_DM01_DMAV'), false)"
        IstHoheitsgrenzpunkt: "true"
        IstHoheitsgrenzsteinAlt: "enumMap(hgp.Hoheitsgrenzstein, 'ja_nein_DM01_DMAV')"
        SymbolOri: "lookup('DM01AVCH24LV95D.Gemeindegrenzen.HoheitsgrenzpunktSymbol', 'HoheitsgrenzpunktSymbol_von', oid(hgp), 'Ori')"
      refs:
        - association: "Entstehung_Grenzpunkt"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-projektiert
            sourceRef: "ls"

    - id: hoheitsgrenzpunkt-gem-gueltig
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grenzpunkt"
      sources:
        - alias: hgp
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.Hoheitsgrenzpunkt"
        - alias: gem
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.GEMNachfuehrung"
      joins:
        - left: hgp
          right: gem
          on: "eq(hgp.Entstehung, gem)"
          type: "inner"
      where: "if(notDefined(gem.Gueltigkeit), true, gem.Gueltigkeit != #projektiert) and coalesce(lookupIn('dm01', 'DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung', 'Identifikator', gem.Identifikator, 'NBIdent'), '') != gem.NBIdent"
      identity:
        sourceKey: ["hgp.Identifikator"]
      assign:
        Nummer: "hgp.Identifikator"
        Geometrie: "hgp.Geometrie"
        Lagegenauigkeit: "div(hgp.LageGen, 100.0)"
        IstLagezuverlaessig: "enumMap(hgp.LageZuv, 'Zuverlaessigkeit_DM01_DMAV')"
        Punktzeichen: "enumMap(hgp.Punktzeichen, 'Versicherungsart_DM01_DMAV')"
        IstExaktDefiniert: "if(coordEquals(hgp.Geometrie, hgp.Geometrie, 0.0), enumMap(hgp.ExaktDefiniert, 'JaNein_DM01_DMAV'), false)"
        IstHoheitsgrenzpunkt: "true"
        IstHoheitsgrenzsteinAlt: "enumMap(hgp.Hoheitsgrenzstein, 'ja_nein_DM01_DMAV')"
        SymbolOri: "lookup('DM01AVCH24LV95D.Gemeindegrenzen.HoheitsgrenzpunktSymbol', 'HoheitsgrenzpunktSymbol_von', oid(hgp), 'Ori')"
      refs:
        - association: "Entstehung_Grenzpunkt"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-gem-gueltig
            sourceRef: "gem"

    - id: hoheitsgrenzpunkt-gem-projektiert
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grenzpunkt"
      sources:
        - alias: hgp
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.Hoheitsgrenzpunkt"
        - alias: gem
          input: dm01
          class: "DM01AVCH24LV95D.Gemeindegrenzen.GEMNachfuehrung"
      joins:
        - left: hgp
          right: gem
          on: "eq(hgp.Entstehung, gem)"
          type: "inner"
      where: "gem.Gueltigkeit == #projektiert and coalesce(lookupIn('dm01', 'DM01AVCH24LV95D.Liegenschaften.LSNachfuehrung', 'Identifikator', gem.Identifikator, 'NBIdent'), '') != gem.NBIdent"
      identity:
        sourceKey: ["hgp.Identifikator"]
      assign:
        Nummer: "hgp.Identifikator"
        Geometrie: "hgp.Geometrie"
        Lagegenauigkeit: "div(hgp.LageGen, 100.0)"
        IstLagezuverlaessig: "enumMap(hgp.LageZuv, 'Zuverlaessigkeit_DM01_DMAV')"
        Punktzeichen: "enumMap(hgp.Punktzeichen, 'Versicherungsart_DM01_DMAV')"
        IstExaktDefiniert: "if(coordEquals(hgp.Geometrie, hgp.Geometrie, 0.0), enumMap(hgp.ExaktDefiniert, 'JaNein_DM01_DMAV'), false)"
        IstHoheitsgrenzpunkt: "true"
        IstHoheitsgrenzsteinAlt: "enumMap(hgp.Hoheitsgrenzstein, 'ja_nein_DM01_DMAV')"
        SymbolOri: "lookup('DM01AVCH24LV95D.Gemeindegrenzen.HoheitsgrenzpunktSymbol', 'HoheitsgrenzpunktSymbol_von', oid(hgp), 'Ori')"
      refs:
        - association: "Entstehung_Grenzpunkt"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-gem-projektiert
            sourceRef: "gem"

    - id: proj-grundstueck
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grundstueck"
      sources:
        - alias: gs
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.ProjGrundstueck"
          where: "gs.Art == #Liegenschaft"
      identity:
        sourceKey: ["gs.NBIdent", "gs.Nummer"]
      assign:
        NBIdent: "gs.NBIdent"
        Nummer: "gs.Nummer"
        EGRID: "gs.EGRIS_EGRID"
        Grundstuecksart: "#Liegenschaft"
        IstStreitig: "(coalesce(gs.Gueltigkeit, #rechtskraeftig) == #streitig)"
        IstVollstaendig: "(coalesce(gs.Vollstaendigkeit, #Vollstaendig) == #Vollstaendig)"
        Fiktiv: "true"
        Gesamtflaechenmass: "gs.GesamteFlaechenmass"
      bags:
        Textposition:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Liegenschaften.ProjGrundstueckPos"
            alias: pos
            where: "refEquals(pos.ProjGrundstueckPos_von, gs)"
          assign:
            Position: "pos.Pos"
            Orientierung: "coalesce(pos.Ori, 100.0)"
            HReferenzpunkt: "coalesce(pos.HAli, 'Center')"
            VReferenzpunkt: "coalesce(pos.VAli, 'Half')"
            Textgroesse: "enumMap(coalesce(pos.Groesse, 'mittel'), 'Schriftgroesse_DM01_DMAV')"
      refs:
        - association: "Entstehung_Grundstueck"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-projektiert
            sourceRef: "gs.Entstehung"

    - id: proj-liegenschaft
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Liegenschaft"
      sources:
        - alias: ls
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.ProjLiegenschaft"
      assign:
        NummerTeilgrundstueck: "ls.NummerTeilGrundstueck"
        Geometrie: "ls.Geometrie"
        Flaechenmass: "ls.Flaechenmass"
        Fiktiv: "true"
        Qualitaetsstandard: "#AV93"
      refs:
        - association: "GrundstueckLiegenschaft"
          role: "Grundstueck"
          required: true
          targetObject:
            rule: proj-grundstueck
            sourceRef: "ls.ProjLiegenschaft_von"

    - id: grundstueck-gueltig
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grundstueck"
      sources:
        - alias: gs
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.Grundstueck"
          where: "gs.Art == #Liegenschaft"
      identity:
        sourceKey: ["gs.NBIdent", "gs.Nummer"]
      assign:
        NBIdent: "gs.NBIdent"
        Nummer: "gs.Nummer"
        EGRID: "gs.EGRIS_EGRID"
        Grundstuecksart: "#Liegenschaft"
        IstStreitig: "(coalesce(gs.Gueltigkeit, #rechtskraeftig) == #streitig)"
        IstVollstaendig: "(coalesce(gs.Vollstaendigkeit, #Vollstaendig) == #Vollstaendig)"
        Fiktiv: "false"
        Gesamtflaechenmass: "gs.GesamteFlaechenmass"
      bags:
        Textposition:
          from:
            input: dm01
            class: "DM01AVCH24LV95D.Liegenschaften.GrundstueckPos"
            alias: pos
            where: "refEquals(pos.GrundstueckPos_von, gs)"
          assign:
            Position: "pos.Pos"
            Orientierung: "coalesce(pos.Ori, 100.0)"
            HReferenzpunkt: "coalesce(pos.HAli, 'Center')"
            VReferenzpunkt: "coalesce(pos.VAli, 'Half')"
            Textgroesse: "enumMap(coalesce(pos.Groesse, 'mittel'), 'Schriftgroesse_DM01_DMAV')"
      refs:
        - association: "Entstehung_Grundstueck"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-gueltig
            sourceRef: "gs.Entstehung"

    - id: liegenschaft
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Liegenschaft"
      sources:
        - alias: ls
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.Liegenschaft"
      assign:
        NummerTeilgrundstueck: "ls.NummerTeilGrundstueck"
        Geometrie: "ls.Geometrie"
        Flaechenmass: "ls.Flaechenmass"
        Fiktiv: "false"
        Qualitaetsstandard: "#AV93"
      refs:
        - association: "GrundstueckLiegenschaft"
          role: "Grundstueck"
          required: true
          targetObject:
            rule: grundstueck-gueltig
            sourceRef: "ls.Liegenschaft_von"

    - id: selbstrecht-grundstueck
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.Grundstueck"
      sources:
        - alias: gs
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.Grundstueck"
          where: "gs.Art != #Liegenschaft"
      identity:
        sourceKey: ["gs.NBIdent", "gs.Nummer"]
      assign:
        NBIdent: "gs.NBIdent"
        Nummer: "gs.Nummer"
        EGRID: "gs.EGRIS_EGRID"
        Grundstuecksart: "#SelbstaendigesDauerndesRecht"
        IstStreitig: "(coalesce(gs.Gueltigkeit, #rechtskraeftig) == #streitig)"
        IstVollstaendig: "(coalesce(gs.Vollstaendigkeit, #Vollstaendig) == #Vollstaendig)"
        Fiktiv: "false"
        Gesamtflaechenmass: "gs.GesamteFlaechenmass"
      refs:
        - association: "Entstehung_Grundstueck"
          role: "Entstehung"
          required: true
          targetObject:
            rule: gs-nachfuehrung-gueltig
            sourceRef: "gs.Entstehung"

    - id: selbstrecht
      target:
        output: dmav
        class: "DMAV_Grundstuecke_V1_1.Grundstuecke.SelbstaendigesDauerndesRecht"
      sources:
        - alias: sr
          input: dm01
          class: "DM01AVCH24LV95D.Liegenschaften.SelbstRecht"
      assign:
        NummerTeilgrundstueck: "sr.NummerTeilGrundstueck"
        Geometrie: "sr.Geometrie"
        Flaechenmass: "sr.Flaechenmass"
