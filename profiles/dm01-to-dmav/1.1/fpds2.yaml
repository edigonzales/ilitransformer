version: 1

job:
  name: dm01-to-dmav-fpds2
  description: "Pilot-Transformation DM01 FixpunkteKategorie2 nach KGKCGC FPDS2"
  direction: dm01-to-dmav
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "https://models.kgk-cgc.ch/"
    - "models/"
  inputs:
    - id: dm01
      path: "input/dm01.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"
  outputs:
    - id: dmav
      path: "build/out/dmav-fpds2.xtf"
      model: "KGKCGC_FPDS2_V1_1"
      format: "xtf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: deterministicUuid
    namespace: "dm01-to-dmav-fpds2"
  basketStrategy:
    default: byTopic

  enums:
    Begehbarkeit_DM01_KGK:
      begehbar: begehbar
      nicht_begehbar: nicht_begehbar

  rules:
    # --- Stammdaten (synthetische Referenzobjekte, werden dedupliziert) ---

    - id: fpds2-zustaendigkeit
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.Zustaendigkeit"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.LFP2Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent"]
      assign:
        Kanton: "'BE'"
        Name: "'Amtliche Vermessung'"

    - id: fpds2-zustaendigkeit-hfp2
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.Zustaendigkeit"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.HFP2Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent"]
      assign:
        Kanton: "'BE'"
        Name: "'Amtliche Vermessung'"

    - id: fpds2-massstab
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.UebersichtMassstab"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.LFP2Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent"]
      assign:
        Massstabszahl: "25000.0"

    - id: fpds2-massstab-hfp2
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.UebersichtMassstab"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.HFP2Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent"]
      assign:
        Massstabszahl: "25000.0"

    - id: fpds2-geodienst
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.UebersichtGeodienst"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.LFP2Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent"]
      assign:
        Bezeichnung: "'FPDS2 Geodienst'"
        URL: "'https://www.kgk-cgc.ch'"

    - id: fpds2-geodienst-hfp2
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.UebersichtGeodienst"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.HFP2Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent"]
      assign:
        Bezeichnung: "'FPDS2 Geodienst'"
        URL: "'https://www.kgk-cgc.ch'"

    # --- Nachführungen ---

    - id: fpds2-nachfuehrung-lfp2
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.FixpunkteNachfuehrung"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.LFP2Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 60)"
        GueltigerEintrag: "'2024-01-01'"
        DatumEroeffnung: "'2024-01-01'"
        Status: "#in_Bearbeitung"

    - id: fpds2-nachfuehrung-hfp2
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.FixpunkteNachfuehrung"
      sources:
        - alias: nf
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.HFP2Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 60)"
        GueltigerEintrag: "'2024-01-01'"
        DatumEroeffnung: "'2024-01-01'"
        Status: "#in_Bearbeitung"

    # --- Fixpunkte ---

    - id: fixpunkt-lfp2
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.Fixpunkt"
      sources:
        - alias: p
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.LFP2"
      identity:
        sourceKey: ["p.NBIdent", "p.Nummer"]
      assign:
        Art: "#LFP2"
        Begehbarkeit: "enumMap(p.Begehbarkeit, 'Begehbarkeit_DM01_KGK')"
        GNSSSichtbarkeit: "#keine_Angabe"
        NBIdent: "p.NBIdent"
        Nummer: "p.Nummer"
        ProtokollSprache: "#deutsch"
        SymbolOri: "100.0"
        TSP: "true"
        Unterhaltsstrategie: "#aktiv"
      refs:
        - association: "FP_Zustaendigkeit"
          role: "ZS"
          required: true
          targetObject:
            rule: fpds2-zustaendigkeit
            sourceRef: "p.Entstehung"
        - association: "FP_UebersichtMassstab"
          role: "UM"
          required: true
          targetObject:
            rule: fpds2-massstab
            sourceRef: "p.Entstehung"
        - association: "FP_UebersichtGeodienst"
          role: "UG"
          required: true
          targetObject:
            rule: fpds2-geodienst
            sourceRef: "p.Entstehung"

    - id: fixpunkt-hfp2
      target:
        output: dmav
        class: "KGKCGC_FPDS2_V1_1.FPDS2.Fixpunkt"
      sources:
        - alias: p
          input: dm01
          class: "DM01AVCH24LV95D.FixpunkteKategorie2.HFP2"
      identity:
        sourceKey: ["p.NBIdent", "p.Nummer"]
      assign:
        Art: "#HFP2"
        Begehbarkeit: "#begehbar"
        GNSSSichtbarkeit: "#keine_Angabe"
        NBIdent: "p.NBIdent"
        Nummer: "p.Nummer"
        ProtokollSprache: "#deutsch"
        TSP: "true"
        Unterhaltsstrategie: "#aktiv"
      refs:
        - association: "FP_Zustaendigkeit"
          role: "ZS"
          required: true
          targetObject:
            rule: fpds2-zustaendigkeit-hfp2
            sourceRef: "p.Entstehung"
        - association: "FP_UebersichtMassstab"
          role: "UM"
          required: true
          targetObject:
            rule: fpds2-massstab-hfp2
            sourceRef: "p.Entstehung"
        - association: "FP_UebersichtGeodienst"
          role: "UG"
          required: true
          targetObject:
            rule: fpds2-geodienst-hfp2
            sourceRef: "p.Entstehung"
