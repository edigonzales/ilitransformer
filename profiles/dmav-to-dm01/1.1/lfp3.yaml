version: 1

# Produktives Mapping-Profil: DMAV -> DM01 LFP3
# Pfade sind relativ zur Mapping-Datei oder koennen via Test/CLI-Profil kopiert werden.
job:
  name: dmav-to-dm01-lfp3
  description: "Pilot-Transformation DMAV FixpunkteAVKategorie3.LFP3 nach DM01 FixpunkteKategorie3.LFP3"
  direction: dmav-to-dm01
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "https://models.interlis.ch"
    - "models/"
  inputs:
    - id: dmav
      path: "input/dmav.xtf"
      model: "DMAV_FixpunkteAVKategorie3_V1_1"
      format: "xtf"
  outputs:
    - id: dm01
      path: "build/out/dm01-lfp3.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: integer
  basketStrategy:
    default: byTopic

  enums:
    Zuverlaessigkeit_DMAV_DM01:
      "true": "ja"
      "false": "nein"
    Versicherungsart_DMAV_DM01:
      Stein: "Stein"
      Kunststoffzeichen: "Kunststoffzeichen"
      Bolzen: "Bolzen"
      Rohr: "Rohr"
      Pfahl: "Pfahl"
      Kreuz: "Kreuz"
      unversichert: "unversichert"
      weitere: "weitere"

  rules:
    - id: lfp3-nachfuehrung
      target:
        output: dm01
        class: "DM01AVCH24LV95D.FixpunkteKategorie3.LFP3Nachfuehrung"
      sources:
        - alias: nf
          input: dmav
          class: "DMAV_FixpunkteAVKategorie3_V1_1.FixpunkteAVKategorie3.LFP3Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 30)"
        Perimeter: "nf.Perimeter"
        GueltigerEintrag: "toDate(nf.GueltigerEintrag)"

    - id: lfp3
      target:
        output: dm01
        class: "DM01AVCH24LV95D.FixpunkteKategorie3.LFP3"
      sources:
        - alias: p
          input: dmav
          class: "DMAV_FixpunkteAVKategorie3_V1_1.FixpunkteAVKategorie3.LFP3"
          where: "p.LFPArt == #LFP3"
      identity:
        sourceKey: ["p.NBIdent", "p.Nummer"]
      assign:
        NBIdent: "p.NBIdent"
        Nummer: "p.Nummer"
        Geometrie: "p.Geometrie"
        HoeheGeom: "p.Hoehengeometrie"
        LageGen: "mul(p.Lagegenauigkeit, 100.0)"
        LageZuv: "enumMap(p.IstLagezuverlaessig, 'Zuverlaessigkeit_DMAV_DM01')"
        HoeheGen: "mul(p.Hoehengenauigkeit, 100.0)"
        HoeheZuv: "enumMap(p.IstHoehenzuverlaessig, 'Zuverlaessigkeit_DMAV_DM01')"
        Punktzeichen: "enumMap(p.Punktzeichen, 'Versicherungsart_DMAV_DM01')"
        Protokoll: "#nein"
      refs:
        - role: "Entstehung"
          required: true
          targetObject:
            rule: lfp3-nachfuehrung
            sourceRef: "p.Entstehung"
      bags:
        Textposition:
          mode: expand
          structure: "DM01AVCH24LV95D.FixpunkteKategorie3.LFP3Pos"
          maxItems: 1
          from:
            input: dmav
            class: "DMAVTYM_Grafik_V1_0.Textposition"
            alias: txt
          assign:
            Pos: "txt.Position"
            Ori: "txt.Orientierung"
            HAli: "txt.HReferenzpunkt"
            VAli: "txt.VReferenzpunkt"
          parentRef:
            role: "LFP3Pos_von"
            parentAlias: "p"
      losses:
        - sourcePath: "p.LFPArt"
          reasonCode: "DMAV_ONLY"
          description: "DM01 LFP3 kennt nur LFP3; DMAV LFPArt wird nicht separat gespeichert."
        - sourcePath: "p.Schutzart"
          reasonCode: "DMAV_ONLY"
          description: "DM01 LFP3 hat kein Attribut fuer Schutzart."
          when: "defined(p.Schutzart)"
        - sourcePath: "p.Grenzpunktfunktion"
          reasonCode: "DMAV_ONLY"
          description: "DM01 LFP3 speichert die Grenzpunktfunktion nicht im LFP3-Objekt."
        - sourcePath: "p.IstHoheitsgrenzsteinAlt"
          reasonCode: "DMAV_ONLY"
          description: "DM01 LFP3 hat kein Attribut fuer IstHoheitsgrenzsteinAlt."
          when: "defined(p.IstHoheitsgrenzsteinAlt)"
        - sourcePath: "p.AktiverUnterhalt"
          reasonCode: "DMAV_ONLY"
          description: "DM01 LFP3 hat kein Attribut fuer AktiverUnterhalt."

    - id: lfp3-symbol
      target:
        output: dm01
        class: "DM01AVCH24LV95D.FixpunkteKategorie3.LFP3Symbol"
      sources:
        - alias: p
          input: dmav
          class: "DMAV_FixpunkteAVKategorie3_V1_1.FixpunkteAVKategorie3.LFP3"
          where: "if(p.LFPArt == #LFP3, defined(p.SymbolOri), false)"
      identity:
        sourceKey: ["p.NBIdent", "p.Nummer"]
      assign:
        Ori: "p.SymbolOri"
      refs:
        - role: "LFP3Symbol_von"
          required: true
          targetObject:
            rule: lfp3
            sourceRef: "p"
