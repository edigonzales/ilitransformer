version: 1

job:
  name: dmav-to-dm01-toleranzstufen
  description: "Pilot-Transformation DMAV Toleranzstufen nach DM01 TSEinteilung"
  direction: dmav-to-dm01
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "https://models.interlis.ch"
    - "models/"
  inputs:
    - id: dmav
      path: "input/dmav.xtf"
      model: "DMAV_Toleranzstufen_V1_1"
      format: "xtf"
  outputs:
    - id: dm01
      path: "build/out/dm01-toleranzstufen.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: integer
  basketStrategy:
    default: byTopic

  enums:
    Toleranzstufe_DMAV_DM01:
      TS1: "TS1"
      TS2: "TS2"
      TS3: "TS3"
      TS4: "TS4"
      TS5: "TS5"

  rules:
    - id: toleranzstufe
      target:
        output: dm01
        class: "DM01AVCH24LV95D.TSEinteilung.Toleranzstufe"
      sources:
        - alias: ts
          input: dmav
          class: "DMAV_Toleranzstufen_V1_1.Toleranzstufen.Toleranzstufe"
      identity:
        sourceKey: ["ts.NBIdent", "ts.Identifikator"]
      assign:
        NBIdent: "ts.NBIdent"
        Identifikator: "ts.Identifikator"
        Geometrie: "ts.Geometrie"
        Art: "enumMap(ts.Toleranzstufe, 'Toleranzstufe_DMAV_DM01')"
