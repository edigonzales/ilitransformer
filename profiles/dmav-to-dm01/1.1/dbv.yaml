version: 1

job:
  name: dmav-to-dm01-dbv
  description: "Pilot-Transformation DMAV DauerndeBodenverschiebungen nach DM01 Rutschgebiete"
  direction: dmav-to-dm01
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "https://models.interlis.ch"
    - "models/"
  inputs:
    - id: dmav
      path: "input/dmav.xtf"
      model: "DMAV_DauerndeBodenverschiebungen_V1_1"
      format: "xtf"
  outputs:
    - id: dm01
      path: "build/out/dm01-dbv.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: integer
  basketStrategy:
    default: byTopic

  enums:
    Schriftgroesse_DMAV_DM01:
      Klein: klein
      Mittel: mittel
      Gross: gross

  rules:
    - id: rutschung-gueltig
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Rutschgebiete.Rutschung"
      sources:
        - alias: dbv
          input: dmav
          class: "DMAV_DauerndeBodenverschiebungen_V1_1.DauerndeBodenverschiebungen.DauerndeBodenverschiebung"
      identity:
        sourceKey: ["dbv.NBIdent", "dbv.Identifikator"]
      assign:
        NBIdent: "dbv.NBIdent"
        Identifikator: "dbv.Identifikator"
        Name: "truncate(dbv.Beschreibung, 30)"
        Geometrie: "dbv.Geometrie"
      bags:
        Textposition:
          mode: expand
          structure: "DM01AVCH24LV95D.Rutschgebiete.RutschungPos"
          from:
            input: dmav
            alias: tpItem
            class: "DMAVTYM_Grafik_V1_0.Textposition"
          parentRef:
            role: RutschungPos_von
            parentAlias: dbv
          assign:
            Pos: "tpItem.Position"
            Ori: "coalesce(tpItem.Orientierung, 100.0)"
            HAli: "coalesce(tpItem.HReferenzpunkt, 'Center')"
            VAli: "coalesce(tpItem.VReferenzpunkt, 'Half')"
            Groesse: "enumMap(coalesce(tpItem.Textgroesse, 'Mittel'), 'Schriftgroesse_DMAV_DM01')"
