version: 1

job:
  name: dmav-to-dm01-nomenklatur
  description: "Pilot-Transformation DMAV Nomenklatur nach DM01 Nomenklatur"
  direction: dmav-to-dm01
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "https://models.interlis.ch"
    - "models/"
  inputs:
    - id: dmav
      path: "input/dmav.xtf"
      model: "DMAV_Nomenklatur_V1_1"
      format: "xtf"
  outputs:
    - id: dm01
      path: "build/out/dm01-nomenklatur.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: integer
  basketStrategy:
    default: byTopic

  enums:
    Schriftgroesse_DMAV_DM01:
      Klein: klein
      Mittel: mittel
      Gross: gross

  rules:
    - id: nk-nachfuehrung-gueltig
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Nomenklatur.NKNachfuehrung"
      sources:
        - alias: nf
          input: dmav
          class: "DMAV_Nomenklatur_V1_1.Nomenklatur.NKNachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 30)"
        Perimeter: "nf.Perimeter"
        GueltigerEintrag: "toDate(nf.GueltigerEintrag)"
        Datum1: "toDate(nf.GueltigerEintrag)"

    - id: flurname-gueltig
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Nomenklatur.Flurname"
      sources:
        - alias: f
          input: dmav
          class: "DMAV_Nomenklatur_V1_1.Nomenklatur.Flurname"
      identity:
        sourceKey: ["f.Name"]
      assign:
        Name: "f.Name"
        Geometrie: "f.Geometrie"
      bags:
        FlurnamePos:
          mode: expand
          structure: "DM01AVCH24LV95D.Nomenklatur.FlurnamePos"
          from:
            input: dmav
            alias: fpItem
            class: "DMAVTYM_Grafik_V1_0.Textposition"
          parentRef:
            role: FlurnamePos_von
            parentAlias: f
          assign:
            Pos: "fpItem.Position"
            Ori: "coalesce(fpItem.Orientierung, 100.0)"
            HAli: "coalesce(fpItem.HReferenzpunkt, 'Center')"
            VAli: "coalesce(fpItem.VReferenzpunkt, 'Half')"
            Groesse: "enumMap(coalesce(fpItem.Textgroesse, 'Mittel'), 'Schriftgroesse_DMAV_DM01')"
      refs:
        - association: "FlurnameEntstehung"
          role: "Entstehung"
          required: true
          targetObject:
            rule: nk-nachfuehrung-gueltig
            sourceRef: "f.Entstehung"

    - id: ortsname-gueltig
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Nomenklatur.Ortsname"
      sources:
        - alias: o
          input: dmav
          class: "DMAV_Nomenklatur_V1_1.Nomenklatur.Ortsname"
      identity:
        sourceKey: ["o.Name"]
      assign:
        Name: "o.Name"
        Geometrie: "o.Geometrie"
        Typ: "o.Typ"
      bags:
        OrtsnamePos:
          mode: expand
          structure: "DM01AVCH24LV95D.Nomenklatur.OrtsnamePos"
          from:
            input: dmav
            alias: opItem
            class: "DMAVTYM_Grafik_V1_0.Textposition"
          parentRef:
            role: OrtsnamePos_von
            parentAlias: o
          assign:
            Pos: "opItem.Position"
            Ori: "coalesce(opItem.Orientierung, 100.0)"
            HAli: "coalesce(opItem.HReferenzpunkt, 'Center')"
            VAli: "coalesce(opItem.VReferenzpunkt, 'Half')"
            Groesse: "enumMap(coalesce(opItem.Textgroesse, 'Mittel'), 'Schriftgroesse_DMAV_DM01')"
      refs:
        - association: "OrtsnameEntstehung"
          role: "Entstehung"
          required: true
          targetObject:
            rule: nk-nachfuehrung-gueltig
            sourceRef: "o.Entstehung"

    # Gelaendename omitted from reverse mapping (same NO IDENT lookup limitation
    # as forward mapping — see dm01-to-dmav nomenklatur.yaml for details).
