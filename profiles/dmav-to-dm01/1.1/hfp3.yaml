version: 1

# Produktives Mapping-Profil: DMAV -> DM01 HFP3
# Pfade sind relativ zur Mapping-Datei oder koennen via Test/CLI-Profil kopiert werden.
job:
  name: dmav-to-dm01-hfp3
  description: "Transformation DMAV FixpunkteAVKategorie3.HFP3 nach DM01 FixpunkteKategorie3.HFP3"
  direction: dmav-to-dm01
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "https://models.interlis.ch"
    - "models/"
  inputs:
    - id: dmav
      path: "input/dmav.xtf"
      model: "DMAV_FixpunkteAVKategorie3_V1_1"
      format: "xtf"
  outputs:
    - id: dm01
      path: "build/out/dm01-hfp3.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: integer
  basketStrategy:
    default: byTopic

  enums:
    Zuverlaessigkeit_DMAV_DM01:
      "true": "ja"
      "false": "nein"

  rules:
    - id: hfp3-nachfuehrung
      target:
        output: dm01
        class: "DM01AVCH24LV95D.FixpunkteKategorie3.HFP3Nachfuehrung"
      sources:
        - alias: nf
          input: dmav
          class: "DMAV_FixpunkteAVKategorie3_V1_1.FixpunkteAVKategorie3.HFP3Nachfuehrung"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 30)"
        Perimeter: "nf.Perimeter"
        GueltigerEintrag: "toDate(nf.GueltigerEintrag)"

    - id: hfp3
      target:
        output: dm01
        class: "DM01AVCH24LV95D.FixpunkteKategorie3.HFP3"
      sources:
        - alias: p
          input: dmav
          class: "DMAV_FixpunkteAVKategorie3_V1_1.FixpunkteAVKategorie3.HFP3"
      identity:
        sourceKey: ["p.NBIdent", "p.Nummer"]
      assign:
        NBIdent: "p.NBIdent"
        Nummer: "p.Nummer"
        Geometrie: "p.Geometrie"
        HoeheGeom: "p.Hoehengeometrie"
        LageGen: "mul(p.Lagegenauigkeit, 100.0)"
        LageZuv: "enumMap(p.IstLagezuverlaessig, 'Zuverlaessigkeit_DMAV_DM01')"
        HoeheGen: "mul(p.Hoehengenauigkeit, 100.0)"
        HoeheZuv: "enumMap(p.IstHoehenzuverlaessig, 'Zuverlaessigkeit_DMAV_DM01')"
      refs:
        - role: "Entstehung"
          required: true
          targetObject:
            rule: hfp3-nachfuehrung
            sourceRef: "p.Entstehung"
      bags:
        Textposition:
          mode: expand
          structure: "DM01AVCH24LV95D.FixpunkteKategorie3.HFP3Pos"
          maxItems: 1
          from:
            input: dmav
            class: "DMAVTYM_Grafik_V1_0.Textposition"
            alias: txt
          assign:
            Pos: "txt.Position"
            Ori: "txt.Orientierung"
            HAli: "txt.HReferenzpunkt"
            VAli: "txt.VReferenzpunkt"
          parentRef:
            role: "HFP3Pos_von"
            parentAlias: "p"
