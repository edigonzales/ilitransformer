version: 1

job:
  name: dmav-to-dm01-rohrleitungen
  description: "Pilot-Transformation DMAV Rohrleitungen nach DM01 Rohrleitungen"
  direction: dmav-to-dm01
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "https://models.interlis.ch"
    - "models/"
  inputs:
    - id: dmav
      path: "input/dmav.xtf"
      model: "DMAV_Rohrleitungen_V1_1"
      format: "xtf"
  outputs:
    - id: dm01
      path: "build/out/dm01-rohrleitungen.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: integer
  basketStrategy:
    default: byTopic

  enums:
    Medium_DMAV_DM01:
      Oel: "Oel"
      Gas: "Gas"
      weitere: "weitere"
    Qualitaetsstandard_DMAV_DM01:
      AV93: "AV93"
      PN: "PN"
    Signalart_Punktart:
      Signal: "Signal"
      Tafel_Stein: "Tafel_Stein"
      weitere: "weitere"
    Schriftgroesse_DMAV_DM01:
      Klein: "klein"
      Mittel: "mittel"
      Gross: "gross"

  rules:
    - id: rl-nachfuehrung
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Rohrleitungen.RLNachfuehrung"
      sources:
        - alias: rl
          input: dmav
          class: "DMAV_Rohrleitungen_V1_1.Rohrleitungen.RLNachfuehrung"
      identity:
        sourceKey: ["rl.NBIdent", "rl.Identifikator"]
      assign:
        NBIdent: "rl.NBIdent"
        Identifikator: "rl.Identifikator"
        Beschreibung: "truncate(rl.Beschreibung, 30)"
        GueltigerEintrag: "toDate(coalesce(rl.GueltigerEintrag, '2000-01-01'))"
        Perimeter: "rl.Perimeter"
        Gueltigkeit: "'gueltig'"

    - id: leitungsobjekt
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Rohrleitungen.Leitungsobjekt"
      sources:
        - alias: lo
          input: dmav
          class: "DMAV_Rohrleitungen_V1_1.Rohrleitungen.Leitungsobjekt"
      assign:
        Betreiber: "lo.Betreiber"
        Qualitaet: "enumMap(coalesce(lo.Qualitaetsstandard, 'PN'), 'Qualitaetsstandard_DMAV_DM01')"
        Art: "enumMap(coalesce(lo.Medium, 'Gas'), 'Medium_DMAV_DM01')"
      refs:
        - association: "LeitungsobjektEntstehung"
          role: "Entstehung"
          required: true
          targetObject:
            rule: rl-nachfuehrung
      bags:
        Punktelement:
          mode: expand
          structure: "DM01AVCH24LV95D.Rohrleitungen.Punktelement"
          from:
            input: dmav
            alias: pe
            class: "DMAV_Rohrleitungen_V1_1.Rohrleitungen.Punktelement"
          parentRef:
            role: Punktelement_von
            parentAlias: lo
          assign:
            Geometrie: "pe.Geometrie"
            Ori: "coalesce(pe.SymbolOri, '100.0')"
        Textposition:
          mode: expand
          structure: "DM01AVCH24LV95D.Rohrleitungen.LeitungsobjektPos"
          from:
            input: dmav
            alias: tpItem
            class: "DMAVTYM_Grafik_V1_0.Textposition"
          parentRef:
            role: LeitungsobjektPos_von
            parentAlias: lo
          assign:
            Pos: "tpItem.Position"
            Ori: "coalesce(tpItem.Orientierung, '100.0')"
            HAli: "coalesce(tpItem.HReferenzpunkt, 'Center')"
            VAli: "coalesce(tpItem.VReferenzpunkt, 'Half')"
            Groesse: "enumMap(coalesce(tpItem.Textgroesse, 'Mittel'), 'Schriftgroesse_DMAV_DM01')"

    - id: signalpunkt
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Rohrleitungen.Signalpunkt"
      sources:
        - alias: sig
          input: dmav
          class: "DMAV_Rohrleitungen_V1_1.Rohrleitungen.Signal"
      assign:
        Nummer: "sig.Nummer"
        Betreiber: "sig.Betreiber"
        Geometrie: "sig.Geometrie"
        Qualitaet: "enumMap(coalesce(sig.Qualitaetsstandard, 'PN'), 'Qualitaetsstandard_DMAV_DM01')"
        Art: "enumMap(coalesce(sig.Medium, 'Gas'), 'Medium_DMAV_DM01')"
        Punktart: "enumMap(coalesce(sig.Signalart, 'Signal'), 'Signalart_Punktart')"
      refs:
        - association: "SignalpunktEntstehung"
          role: "Entstehung"
          required: true
          targetObject:
            rule: rl-nachfuehrung
      bags:
        Textposition:
          mode: expand
          structure: "DM01AVCH24LV95D.Rohrleitungen.SignalpunktPos"
          from:
            input: dmav
            alias: tpItem
            class: "DMAVTYM_Grafik_V1_0.Textposition"
          parentRef:
            role: SignalpunktPos_von
            parentAlias: sig
          assign:
            Pos: "tpItem.Position"
            Ori: "coalesce(tpItem.Orientierung, '100.0')"
            HAli: "coalesce(tpItem.HReferenzpunkt, 'Center')"
            VAli: "coalesce(tpItem.VReferenzpunkt, 'Half')"

    - id: einzelpunkt
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Rohrleitungen.Einzelpunkt"
      sources:
        - alias: mp
          input: dmav
          class: "DMAV_Rohrleitungen_V1_1.Rohrleitungen.Messpunkt"
      assign:
        Identifikator: "coalesce(mp.Nummer, '')"
        Geometrie: "mp.Geometrie"
        LageGen: "mul(mp.Lagegenauigkeit, 100)"
        LageZuv: "if(mp.IstLagezuverlaessig, 'ja', 'nein')"
        ExaktDefiniert: "if(mp.IstExaktDefiniert, 'Ja', 'Nein')"
      refs:
        - association: "EinzelpunktEntstehung"
          role: "Entstehung"
          required: false
          targetObject:
            rule: rl-nachfuehrung
