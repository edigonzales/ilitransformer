version: 1

job:
  name: dmav-to-dm01-eo
  description: "Pilot-Transformation DMAV Einzelobjekte nach DM01 Einzelobjekte"
  direction: dmav-to-dm01
  failPolicy: strict
  modeldir:
    - "https://models.geo.admin.ch/"
    - "https://models.interlis.ch"
    - "models/"
  inputs:
    - id: dmav
      path: "input/dmav.xtf"
      model: "DMAV_Einzelobjekte_V1_1"
      format: "xtf"
  outputs:
    - id: dm01
      path: "build/out/dm01-eo.itf"
      model: "DM01AVCH24LV95D"
      format: "itf"

mapping:
  compileMode: compatible
  oidStrategy:
    default: integer
  basketStrategy:
    default: byTopic

  enums:
    Einzelobjektart_DMAV_DM01:
      Mauer: Mauer
      unterirdisches_Gebaeude: unterirdisches_Gebaeude
      uebriger_Gebaeudeteil: uebriger_Gebaeudeteil
      eingedoltes_oeffentliches_Gewaesser: eingedoltes_oeffentliches_Gewaesser
      wichtige_Treppe: wichtige_Treppe
      Tunnel_Unterfuehrung_Galerie: Tunnel_Unterfuehrung_Galerie
      Bruecke_Passerelle: Bruecke_Passerelle
      Bahnsteig: Bahnsteig
      Brunnen: Brunnen
      Reservoir: Reservoir
      Pfeiler: Pfeiler
      Unterstand: Unterstand
      Silo_Turm_Gasometer: Silo_Turm_Gasometer
      Hochkamin: Hochkamin
      Denkmal: Denkmal
      Mast_Antenne: Mast_Antenne
      Aussichtsturm: Aussichtsturm
      Uferverbauung: Uferverbauung
      Schwelle: Schwelle
      Lawinenverbauung: Lawinenverbauung
      massiver_Sockel: massiver_Sockel
      Ruine_archaeologisches_Objekt: Ruine_archaeologisches_Objekt
      Landungssteg: Landungssteg
      einzelner_Fels: einzelner_Fels
      schmale_bestockte_Flaeche: schmale_bestockte_Flaeche
      Rinnsal: Rinnsal
      schmaler_Weg: schmaler_Weg
      Hochspannungsfreileitung: Hochspannungsfreileitung
      Druckleitung: Druckleitung
      Bahngeleise: Bahngeleise
      Luftseilbahn: Luftseilbahn
      Gondelbahn_Sesselbahn: Gondelbahn_Sesselbahn
      Materialseilbahn: Materialseilbahn
      Skilift: Skilift
      Faehre: Faehre
      Grotte_Hoehleneingang: Grotte_Hoehleneingang
      Achse: Achse
      wichtiger_Einzelbaum: wichtiger_Einzelbaum
      Bildstock_Kruzifix: Bildstock_Kruzifix
      Quelle: Quelle
      Bezugspunkt: Bezugspunkt
      Jauchengrube_Mistlege: weitere
    Zuverlaessigkeit_DMAV_DM01:
      true: ja
      false: nein
    ExaktDefiniert_DMAV_DM01:
      true: Ja
      false: Nein
    Schriftgroesse_DMAV_DM01:
      Klein: klein
      Mittel: mittel
      Gross: gross

  rules:
    - id: eo-nachfuehrung-gueltig
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Einzelobjekte.EONachfuehrung"
      sources:
        - alias: nf
          input: dmav
          class: "DMAV_Einzelobjekte_V1_1.Einzelobjekte.EONachfuehrung"
          where: "lookup('DMAV_Einzelobjekte_V1_1.Einzelobjekte.Einzelobjekt', 'Entstehung', oid(nf), 'Objektstatus') != #projektiert"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 30)"
        Perimeter: "nf.Perimeter"
        Gueltigkeit: "#gueltig"
        GueltigerEintrag: "toDate(nf.GueltigerEintrag)"

    - id: eo-nachfuehrung-projektiert
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Einzelobjekte.EONachfuehrung"
      sources:
        - alias: nf
          input: dmav
          class: "DMAV_Einzelobjekte_V1_1.Einzelobjekte.EONachfuehrung"
          where: "lookup('DMAV_Einzelobjekte_V1_1.Einzelobjekte.Einzelobjekt', 'Entstehung', oid(nf), 'Objektstatus') == #projektiert"
      identity:
        sourceKey: ["nf.NBIdent", "nf.Identifikator"]
      assign:
        NBIdent: "nf.NBIdent"
        Identifikator: "nf.Identifikator"
        Beschreibung: "truncate(nf.Beschreibung, 30)"
        Perimeter: "nf.Perimeter"
        Gueltigkeit: "#projektiert"
        GueltigerEintrag: "toDate(nf.GueltigerEintrag)"

    - id: einzelobjekt
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Einzelobjekte.Einzelobjekt"
      sources:
        - alias: eo
          input: dmav
          class: "DMAV_Einzelobjekte_V1_1.Einzelobjekte.Einzelobjekt"
          where: "eo.Objektstatus != #projektiert"
      identity:
        sourceKey: ["eo.Objektstatus", "eo.Einzelobjektart", "eo.EGID"]
      assign:
        Qualitaet: "eo.Qualitaetsstandard"
        Art: "enumMap(eo.Einzelobjektart, 'Einzelobjektart_DMAV_DM01')"
      bags:
        Flaechenelement:
          mode: expand
          structure: "DM01AVCH24LV95D.Einzelobjekte.Flaechenelement"
          from:
            input: dmav
            alias: fe
            class: "DMAV_Einzelobjekte_V1_1.Einzelobjekte.Flaechenelement"
          parentRef:
            role: Flaechenelement_von
            parentAlias: eo
          assign:
            Geometrie: "fe.Geometrie"
          nestedBags:
            Symbolposition:
              mode: expand
              structure: "DM01AVCH24LV95D.Einzelobjekte.FlaechenelementSymbol"
              from:
                input: dmav
                alias: fes
                class: "DMAVTYM_Grafik_V1_0.Symbolposition"
              parentRef:
                role: FlaechenelementSymbol_von
                parentAlias: fe
              assign:
                Pos: "fes.Position"
                Ori: "coalesce(fes.Orientierung, 100.0)"
        Linienelement:
          mode: expand
          structure: "DM01AVCH24LV95D.Einzelobjekte.Linienelement"
          from:
            input: dmav
            alias: le
            class: "DMAV_Einzelobjekte_V1_1.Einzelobjekte.Linienelement"
          parentRef:
            role: Linienelement_von
            parentAlias: eo
          assign:
            Geometrie: "le.Geometrie"
          nestedBags:
            Symbolposition:
              mode: expand
              structure: "DM01AVCH24LV95D.Einzelobjekte.LinienelementSymbol"
              from:
                input: dmav
                alias: les
                class: "DMAVTYM_Grafik_V1_0.Symbolposition"
              parentRef:
                role: LinienelementSymbol_von
                parentAlias: le
              assign:
                Pos: "les.Position"
                Ori: "les.Orientierung"
        Punktelement:
          mode: expand
          structure: "DM01AVCH24LV95D.Einzelobjekte.Punktelement"
          from:
            input: dmav
            alias: pe
            class: "DMAV_Einzelobjekte_V1_1.Einzelobjekte.Punktelement"
          parentRef:
            role: Punktelement_von
            parentAlias: eo
          assign:
            Geometrie: "pe.Geometrie"
            Ori: "pe.SymbolOri"
        Objektname:
          mode: expand
          structure: "DM01AVCH24LV95D.Einzelobjekte.Objektname"
          from:
            input: dmav
            alias: onItem
            class: "DMAV_Einzelobjekte_V1_1.Einzelobjekte.Objektname"
          parentRef:
            role: Objektname_von
            parentAlias: eo
          assign:
            Name: "onItem.Name"
          nestedBags:
            Textposition:
              mode: expand
              structure: "DM01AVCH24LV95D.Einzelobjekte.ObjektnamePos"
              from:
                input: dmav
                alias: onp
                class: "DMAVTYM_Grafik_V1_0.Textposition"
              parentRef:
                role: ObjektnamePos_von
                parentAlias: onItem
              assign:
                Pos: "onp.Position"
                Ori: "coalesce(onp.Orientierung, 100.0)"
                HAli: "coalesce(onp.HReferenzpunkt, 'Center')"
                VAli: "coalesce(onp.VReferenzpunkt, 'Half')"
                Groesse: "enumMap(coalesce(onp.Textgroesse, 'Mittel'), 'Schriftgroesse_DMAV_DM01')"
        Objektnummer:
          mode: expand
          structure: "DM01AVCH24LV95D.Einzelobjekte.Objektnummer"
          from:
            input: dmav
            alias: onuItem
            class: "DMAV_Einzelobjekte_V1_1.Einzelobjekte.Objektnummer"
          parentRef:
            role: Objektnummer_von
            parentAlias: eo
          assign:
            Nummer: "onuItem.Nummer"
            GWR_EGID: "eo.EGID"
          nestedBags:
            Textposition:
              mode: expand
              structure: "DM01AVCH24LV95D.Einzelobjekte.ObjektnummerPos"
              from:
                input: dmav
                alias: onup
                class: "DMAVTYM_Grafik_V1_0.Textposition"
              parentRef:
                role: ObjektnummerPos_von
                parentAlias: onuItem
              assign:
                Pos: "onup.Position"
                Ori: "coalesce(onup.Orientierung, 100.0)"
                HAli: "coalesce(onup.HReferenzpunkt, 'Center')"
                VAli: "coalesce(onup.VReferenzpunkt, 'Half')"
                Groesse: "enumMap(coalesce(onup.Textgroesse, 'Mittel'), 'Schriftgroesse_DMAV_DM01')"
      refs:
        - association: "EinzelobjektEntstehung"
          role: "Entstehung"
          required: true
          targetObject:
            rule: eo-nachfuehrung-gueltig
            sourceRef: "eo.Entstehung"

    - id: messpunkt
      target:
        output: dm01
        class: "DM01AVCH24LV95D.Einzelobjekte.Einzelpunkt"
      sources:
        - alias: m
          input: dmav
          class: "DMAV_Einzelobjekte_V1_1.Einzelobjekte.Messpunkt"
      identity:
        sourceKey: ["m.Nummer"]
      assign:
        Identifikator: "m.Nummer"
        Geometrie: "m.Geometrie"
        LageGen: "div(m.Lagegenauigkeit, 0.01)"
        LageZuv: "enumMap(m.IstLagezuverlaessig, 'Zuverlaessigkeit_DMAV_DM01')"
        ExaktDefiniert: "enumMap(m.IstExaktDefiniert, 'ExaktDefiniert_DMAV_DM01')"
      refs:
        - association: "EinzelpunktEntstehung"
          role: "Entstehung"
          required: false
          targetObject:
            rule: eo-nachfuehrung-gueltig
            sourceRef: "m.Entstehung"
