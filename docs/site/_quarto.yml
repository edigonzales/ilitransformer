format:
  html:
    theme:
      - default
      - inter-theme.scss
    css: 
      - styles.css
    toc: true
    toc-location: right
    toc-depth: 3
    link-external-newwindow: true
    mainfont: Inter
    code-copy: true
    grid:
      sidebar-width: 290px
      margin-width: 280px
      body-width: 1150px

editor: visual
