project:
  type: website
  output-dir: _site

website:
  title: "INTERLIS Transformer"
  site-url: "https://transformer.interlis.guru"
  repo-url: "https://github.com/edigonzales/ilitransformer"
  search:
    location: navbar
    type: overlay
  navbar:
    logo: assets/img/ilitransformer.svg
    title: false
    left:
      - href: index.qmd
        text: Überblick
      - href: quickstart.qmd
        text: Schnellstart
      - href: demo/index.qmd
        text: Demo
      - href: formats/index.qmd
        text: Formate
      - href: vscode/index.qmd
        text: VS Code
      - href: reference/index.qmd
        text: Referenz
    right:
      - icon: github
        href: https://github.com/edigonzales/ilitransformer
  sidebar:
    - title: "Grundlagen"
      contents:
        - quickstart.qmd
        - concepts/index.qmd
        - concepts/iom.qmd
        - concepts/ilimap.qmd
        - concepts/architecture.qmd
    - title: "Demo"
      contents:
        - demo/index.qmd
        - demo/01-hello-copy.qmd
        - demo/07-bags-structures.qmd
        - demo/08-associations-refs.qmd
        - demo/09-oid-basket-loss-metadata.qmd
    - title: "Formate"
      contents:
        - formats/index.qmd
        - formats/csv.qmd
        - formats/geopackage-jdbc-shp.qmd
    - title: "VS Code"
      contents:
        - vscode/index.qmd
        - vscode/mapping-overview.qmd
    - title: "Referenz"
      contents:
        - reference/index.qmd
        - reference/cli.qmd
        - reference/expressions.qmd
        - reference/status.qmd
  page-footer:
    left: "INTERLIS Transformer"
    center: "Dokumentation für transformer.interlis.guru"
    right:
      - text: "GitHub"
        href: https://github.com/edigonzales/ilitransformer

format:
  html:
    lang: de
    toc: true
    code-copy: true
    code-overflow: wrap
    theme:
      - cosmo
      - styles/ilitransformer.scss

