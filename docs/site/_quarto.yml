project:
  type: website
  output-dir: _site
  preview:
    port: 3000
    watch-inputs: true

website:
  title: "INTERLIS Transformer"
  site-url: "https://transformer.interlis.guru"
  repo-url: "https://github.com/edigonzales/ilitransformer"
  favicon: assets/img/ilitransformer.png
  navbar:
    pinned: true
    logo: assets/img/ilitransformer.png
    logo-alt: INTERLIS Transformer logo
    search: false
    left:
      - text: Start 
        href: erste_schritte.qmd
      - text: Demo
        href: demo.qmd

      - href: quickstart.qmd
        text: Schnellstart
      - href: formats/index.qmd
        text: Formate
      - href: vscode/index.qmd
        text: VS Code
      - href: reference/index.qmd
        text: Referenz
    right:
      - icon: github
        href: https://github.com/edigonzales/ilitransformer
  sidebar:
    - title: "Grundlagen"
      contents:
        - quickstart.qmd
        - concepts/index.qmd
        - concepts/iom.qmd
        - concepts/ilimap.qmd
        - concepts/architecture.qmd
    - title: "Demo"
      contents:
        - demo/index.qmd
        - demo/01-hello-copy.qmd
        - demo/07-bags-structures.qmd
        - demo/08-associations-refs.qmd
        - demo/09-oid-basket-loss-metadata.qmd
    - title: "Formate"
      contents:
        - formats/index.qmd
        - formats/csv.qmd
        - formats/geopackage-jdbc-shp.qmd
    - title: "VS Code"
      contents:
        - vscode/index.qmd
        - vscode/mapping-overview.qmd
    - title: "Referenz"
      contents:
        - reference/index.qmd
        - reference/cli.qmd
        - reference/expressions.qmd
        - reference/status.qmd
  page-footer:
    left: "Copyright 2026, INTERLIS Transformer contributors"

