<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Platzhalter für ilimap-Code-Ausschnitt</title>
  <desc id="desc">Reduzierter Code-Ausschnitt mit Zeilennummern und einer kleinen Transformationsandeutung.</desc>
  <rect width="900" height="560" fill="#fff"/>
  <rect x="18" y="18" width="864" height="524" rx="2" fill="#fff" stroke="#d9dee6" stroke-width="2"/>
  <line x1="650" y1="18" x2="650" y2="542" stroke="#d9dee6" stroke-width="2"/>
  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="20">
    <g fill="#8b94a3" text-anchor="end">
      <text x="65" y="58">1</text><text x="65" y="93">2</text><text x="65" y="128">3</text>
      <text x="65" y="163">4</text><text x="65" y="198">5</text><text x="65" y="233">6</text>
      <text x="65" y="268">7</text><text x="65" y="303">8</text><text x="65" y="338">9</text>
      <text x="65" y="373">10</text><text x="65" y="408">11</text><text x="65" y="443">12</text>
      <text x="65" y="478">13</text><text x="65" y="513">14</text>
    </g>
    <text x="95" y="58" fill="#d51f26">mapping</text><text x="205" y="58" fill="#20242a">v2</text>
    <text x="95" y="93" fill="#8b94a3">// Beispiel: Gebäude aus AV nach LV95</text>
    <text x="95" y="163" fill="#d51f26">input</text><text x="175" y="163" fill="#20242a">src = </text><text x="245" y="163" fill="#064b96">"av_gebaeude_v1.ili"</text>
    <text x="95" y="198" fill="#d51f26">output</text><text x="190" y="198" fill="#20242a">tgt = </text><text x="260" y="198" fill="#064b96">"lv95_gebaeude_v1.ili"</text>
    <text x="95" y="268" fill="#d51f26">rule</text><text x="155" y="268" fill="#20242a">GebaeudeAV_To_GebaeudeLV95</text>
    <text x="125" y="303" fill="#d51f26">source</text>
    <text x="155" y="338" fill="#20242a">s : src.</text><text x="245" y="338" fill="#064b96">AV_Gebaeude.Gebaeude</text>
    <text x="125" y="373" fill="#d51f26">target</text>
    <text x="155" y="408" fill="#20242a">t : tgt.</text><text x="245" y="408" fill="#064b96">LV95_Gebaeude.Gebaeude</text>
    <text x="125" y="478" fill="#d51f26">assign</text>
    <text x="155" y="513" fill="#20242a">t.Geometrie = </text><text x="325" y="513" fill="#d51f26">ref</text><text x="370" y="513" fill="#20242a">s.Geometrie</text>
  </g>
  <g transform="translate(710 250)">
    <text x="0" y="0" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="28" fill="#d51f26">{</text>
    <text x="58" y="0" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="28" fill="#d8a6aa">›</text>
    <text x="106" y="0" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="28" fill="#d9dee6">›</text>
    <text x="154" y="0" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="28" fill="#b8c8e6">›</text>
    <text x="206" y="0" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="28" fill="#064b96">}</text>
  </g>
</svg>

