<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-labelledby="title desc">
  <title id="title">Platzhalter für VS-Code-Erweiterungssuche</title>
  <desc id="desc">Platzhalter für einen Screenshot der Erweiterungssuche in VS Code mit Suchbegriff ilimap.</desc>
  <rect width="900" height="480" fill="#fff"/>
  <rect x="40" y="40" width="820" height="400" fill="#fff" stroke="#d9dee6" stroke-width="2"/>
  <!-- Suchleiste -->
  <rect x="70" y="70" width="760" height="48" rx="4" fill="#fff" stroke="#064b96" stroke-width="2"/>
  <rect x="70" y="70" width="760" height="48" rx="4" fill="#064b96" opacity=".06"/>
  <text x="90" y="100" font-family="Frutiger, Segoe UI, sans-serif" font-size="20" fill="#8b94a3">ilimap</text>
  <rect x="190" y="82" width="1" height="24" fill="#d9dee6"/>
  <!-- Suchergebnis -->
  <rect x="70" y="140" width="760" height="72" rx="4" fill="#fff" stroke="#d9dee6" stroke-width="1"/>
  <text x="100" y="172" font-family="Frutiger, Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#20242a">ilimap</text>
  <text x="100" y="196" font-family="Frutiger, Segoe UI, sans-serif" font-size="16" fill="#656d78">Language support for ilimap mapping profiles</text>
  <text x="740" y="178" font-family="Frutiger, Segoe UI, sans-serif" font-size="16" fill="#656d78" text-anchor="end">edigonzales</text>
  <!-- Install-Button -->
  <rect x="650" y="150" width="90" height="32" rx="2" fill="#064b96"/>
  <text x="695" y="172" font-family="Frutiger, Segoe UI, sans-serif" font-size="15" fill="#fff" text-anchor="middle">Install</text>
  <!-- Footer-Text -->
  <text x="70" y="405" font-family="Frutiger, Segoe UI, sans-serif" font-size="18" fill="#656d78">Bildplatzhalter: Screenshot der Erweiterungssuche in VS Code einsetzen</text>
</svg>
