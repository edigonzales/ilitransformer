<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-labelledby="title desc">
  <title id="title">Platzhalter für Trace Inspector</title>
  <desc id="desc">Platzhalter für einen Screenshot des Trace Inspectors in der Mapping Overview.</desc>
  <rect width="900" height="400" fill="#fff"/>
  <rect x="40" y="20" width="820" height="350" fill="#fff" stroke="#d9dee6" stroke-width="2"/>
  <!-- Coverage-Matrix (oberer Teil) -->
  <text x="70" y="60" font-family="Frutiger, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#20242a">Coverage — t:HelloDemo.Persons.Target</text>
  <rect x="70" y="75" width="760" height="28" fill="#f5f6fa"/>
  <text x="85" y="95" font-family="Frutiger, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#20242a">Attribut</text>
  <text x="260" y="95" font-family="Frutiger, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#20242a">Typ</text>
  <text x="440" y="95" font-family="Frutiger, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#20242a">Quelle</text>
  <text x="680" y="95" font-family="Frutiger, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#20242a">Status</text>
  <!-- Zeile 1 -->
  <rect x="70" y="103" width="760" height="26" fill="#fff"/>
  <text x="85" y="121" font-family="Frutiger, Segoe UI, sans-serif" font-size="14" fill="#20242a">Label</text>
  <text x="260" y="121" font-family="Frutiger, Segoe UI, sans-serif" font-size="13" fill="#656d78">TEXT*60</text>
  <text x="440" y="121" font-family="Frutiger, Segoe UI, sans-serif" font-size="13" fill="#656d78">trim(s.Name)</text>
  <text x="680" y="121" font-family="Frutiger, Segoe UI, sans-serif" font-size="14" fill="#064b96">✓</text>
  <!-- Zeile 2 (ausgewählt/hervorgehoben) -->
  <rect x="70" y="129" width="760" height="26" fill="#064b96" opacity=".08"/>
  <text x="85" y="147" font-family="Frutiger, Segoe UI, sans-serif" font-size="14" fill="#20242a">LabelGross</text>
  <text x="260" y="147" font-family="Frutiger, Segoe UI, sans-serif" font-size="13" fill="#656d78">TEXT*60</text>
  <text x="440" y="147" font-family="Frutiger, Segoe UI, sans-serif" font-size="13" fill="#656d78">upper(trim(s.Name))</text>
  <text x="680" y="147" font-family="Frutiger, Segoe UI, sans-serif" font-size="14" fill="#064b96">✓</text>
  <!-- Trace Inspector (unterer Teil) -->
  <line x1="60" y1="170" x2="880" y2="170" stroke="#d9dee6" stroke-width="1"/>
  <text x="70" y="200" font-family="Frutiger, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#20242a">Trace: t.LabelGross</text>
  <!-- Baumstruktur -->
  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15">
    <text x="70" y="235" fill="#20242a">t.LabelGross</text>
    <text x="105" y="265" fill="#656d78">└─ </text><text x="120" y="265" fill="#d51f26">upper</text><text x="175" y="265" fill="#20242a">(</text><text x="185" y="265" fill="#d51f26">trim</text><text x="220" y="265" fill="#20242a">(s.Name))</text>
    <text x="140" y="295" fill="#656d78">└─ </text><text x="155" y="295" fill="#d51f26">trim</text><text x="190" y="295" fill="#20242a">(s.Name)</text>
    <text x="175" y="325" fill="#656d78">└─ </text><text x="190" y="325" fill="#20242a">s.Name</text>
    <text x="210" y="350" fill="#656d78">└─ </text><text x="225" y="350" fill="#20242a">INPUT.Name   </text><text x="370" y="350" fill="#8b94a3">(TEXT*60)</text>
  </g>
  <text x="70" y="380" font-family="Frutiger, Segoe UI, sans-serif" font-size="16" fill="#656d78">Bildplatzhalter: Trace Inspector mit Vorwärts-Trace einsetzen</text>
</svg>
